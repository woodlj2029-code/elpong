function computeStats(playerOrder,history){
  const s={};
  playerOrder.forEach(n=>{
    s[n]={wins:0,losses:0,h2h:{},pointsScored:0,pointsConceded:0,currentStreak:0,bestStreak:0};
    playerOrder.forEach(m=>{if(m!==n)s[n].h2h[m]={w:0,l:0}});
  });
  const ord=[...history].sort((a,b)=>a.ts-b.ts);
  ord.forEach(g=>{
    const W=s[g.winner],L=s[g.loser];
    if(!W||!L)return;
    W.wins++;L.losses++;
    if(!W.h2h[g.loser])W.h2h[g.loser]={w:0,l:0};
    if(!L.h2h[g.winner])L.h2h[g.winner]={w:0,l:0};
    W.h2h[g.loser].w++;L.h2h[g.winner].l++;
    if(g.winScore!=null){W.pointsScored+=g.winScore;W.pointsConceded+=g.loseScore;L.pointsScored+=g.loseScore;L.pointsConceded+=g.winScore}
  });
  playerOrder.forEach(n=>{
    let cur=0,best=0;
    ord.forEach(g=>{if(g.winner===n){cur++;if(cur>best)best=cur}else if(g.loser===n)cur=0});
    s[n].currentStreak=cur;s[n].bestStreak=best;
  });
  return s;
}
function netG(stats,a,b){const h=stats[a]?.h2h?.[b]||{w:0,l:0};return h.w-h.l}
function rankP(playerOrder,stats){
  return[...playerOrder].sort((a,b)=>{
    const sa=stats[a]||{wins:0,losses:0},sb=stats[b]||{wins:0,losses:0};
    const ta=sa.wins+sa.losses,tb=sb.wins+sb.losses;
    const pa=ta>0?sa.wins/ta:-1,pb=tb>0?sb.wins/tb:-1;
    if(pb!==pa)return pb-pa;
    return(sb.wins-sb.losses)-(sa.wins-sa.losses);
  });
}
function pct(w,l){if(w+l===0)return null;return Math.round(w/(w+l)*100)}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function genCode(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code="";
  for(let i=0;i<6;i++)code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}
function fmtTime(ts){
  const d=new Date(ts),now=new Date(),diff=(now-d)/1000;
  if(diff<60)return"just now";
  if(diff<3600)return Math.floor(diff/60)+"m ago";
  if(diff<86400)return Math.floor(diff/3600)+"h ago";
  if(diff<604800)return Math.floor(diff/86400)+"d ago";
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:d.getFullYear()!==now.getFullYear()?"numeric":undefined});
}

function migrateLocal(){
  for(const key of[LS_LEGACY,LS_LEGACY2]){
    const d=lsGet(key);
    if(!d)continue;
    const po=d.playerOrder||(d.players?Object.keys(d.players):[]);
    const hist=(d.history||[]).map(h=>({...h,id:h.id||uid()}));
    if(po.length||hist.length)return{playerOrder:po,history:hist};
  }
  return null;
}

function App(){

  async function registerMember(name,forceRole){
    const sb=getSB();
    const tid=activeTid||lsGet("elpong_active");
    if(!tid||!name)return;
    try{
      const{data}=await sb.from("tournaments").select("members,host_id").eq("id",tid).single();
      const members=data?.members||[];
      const hostId=data?.host_id||'';
      const existing=members.find(m=>m.id===myId);
      // Creator gets host role, everyone else joins as viewer
      const role=forceRole||(myId===hostId?"host":"viewer");
      if(!existing){
        const updated=[...members,{id:myId,name,role,joinedAt:Date.now()}];
        await sb.from("tournaments").update({members:updated,updated_at:new Date().toISOString()}).eq("id",tid);
        setTournaments(prev=>prev.map(t=>t.id===tid?{...t,members:updated}:t));
        // If viewer, show toast telling them they need host approval
        if(role==="viewer")showToast("Joined as viewer - host can promote you");
      } else if(existing.name!==name){
        // Update name if changed
        const updated=members.map(m=>m.id===myId?{...m,name}:m);
        await sb.from("tournaments").update({members:updated,updated_at:new Date().toISOString()}).eq("id",tid);
        setTournaments(prev=>prev.map(t=>t.id===tid?{...t,members:updated}:t));
      }
    }catch(e){console.error("member reg",e)}
  }

    const t=tournaments.find(x=>x.id===activeTid);
    if(!t)return false;
    // Check hostId field OR member role
    if(t.hostId===myId)return true;
    const member=(t.members||[]).find(m=>m.id===myId);
    return member&&member.role==="host";
  }

  function myRole(){
    const t=tournaments.find(x=>x.id===activeTid);
    if(!t)return"viewer";
    const m=(t.members||[]).find(x=>x.id===myId);
    if(!m)return"viewer";
    return m.role;
  }

  function canEdit(){
    return myRole()==="editor"||myRole()==="host";

        return exists?prev.map(x=>x.id===t.id?t:x):[...prev,t];

  async function loadTournaments(){
    setLoading(true);
    const sb=getSB();
    const savedList=getSaved();
    let all=[];
    if(savedList.length>0){
      const{data}=await sb.from("tournaments").select("*").in("id",savedList.map(s=>s.id));
      if(data)all=data.map(dbToLocal);
    }
    if(all.length===0){
      const legacy=migrateLocal();
      const storedNameForFirst=lsGet("elpong_username")||"Host";
      const creatorMember={id:myId,name:storedNameForFirst,role:"host",joinedAt:Date.now()};
      const t={id:uid(),name:"Tournament 1",playerOrder:legacy?legacy.playerOrder:[],history:legacy?legacy.history:[],joinCode:genCode(),members:[creatorMember],hostId:myId};
      const{error}=await sb.from("tournaments").upsert(localToDb(t));
      if(!error){all=[t];pinTournament(t.id,t.name);if(legacy)showToast("Migrated your existing data")}
    }
    setTournaments(all);
    const lastActive=localStorage.getItem("elpong_active");
    const found=lastActive&&all.find(t=>t.id===lastActive);
    const activeId=found?lastActive:all[0]?.id;
    setActiveTid(activeId);
    // Auto-register as member if we have a name
    const storedName=lsGet("elpong_username");
    if(storedName&&activeId){setTimeout(()=>registerMember(storedName,null),500)}
    setLoading(false);

        setTournaments(prev=>prev.map(t=>t.id===activeTid?updated:t));
      })
      .subscribe();
    subRef.current=ch;
    return()=>{ch.unsubscribe();subRef.current=null};

  function dbToLocal(row){return{id:row.id,name:row.name,playerOrder:Array.isArray(row.player_order)?row.player_order:[],history:Array.isArray(row.history)?row.history:[],members:Array.isArray(row.members)?row.members:[],joinCode:row.join_code||'',hostId:row.host_id||''}}

    setSyncing(true);

      const next=prev.map(t=>t.id===activeTid?fn(t):t);
      const updated=next.find(t=>t.id===activeTid);
      if(updated)pushUpdate(updated);
      return next;
    });
  }

    const list=getSaved();
    if(list.find(s=>s.id===id))return;
    lsSet(LS_SAVED,[...list,{id,name,savedAt:Date.now()}]);

    const ws=lgWinScore!==""?parseInt(lgWinScore):null;
    const ls=lgLoseScore!==""?parseInt(lgLoseScore):null;

      const count=Math.max(1,parseInt(String(lgBulk))||1);
      const games=Array.from({length:count},(_,i)=>({id:uid(),winner:lgWinner,loser:lgLoser,winScore:ws,loseScore:ls,ts:ts-i*1000}));
      updateSt(t=>({...t,history:[...games,...t.history]}));
      showToast("Added "+count+" game"+(count>1?"s":"")+": "+lgWinner+" beat "+lgLoser);

      showToast(lgWinner+" beat "+lgLoser+(ws!=null?" ("+ws+"-"+ls+")":""));

    await pushUpdate(updated);
    setEditTournIdx(null);showToast("Renamed to \""+name+"\"");

    await getSB().from("tournaments").delete().eq("id",id);

    setTournaments(next);
    if(activeTid===id)setActiveTid(next[0]?.id||null);
    setShowTournaments(false);showToast("Tournament deleted");

  function buildStatsContext(){
    const lines=[];
    lines.push("Tournament: "+st.name);
    lines.push("Players: "+st.playerOrder.join(", "));
    lines.push("Total games: "+st.history.length);
    st.playerOrder.forEach(n=>{
      const s=computeStats(st.playerOrder,st.history)[n]||{wins:0,losses:0,currentStreak:0,bestStreak:0,h2h:{}};
      const wp=pct(s.wins,s.losses);
      lines.push(n+": "+s.wins+"W-"+s.losses+"L, win rate "+(wp!==null?wp+"%":"no games")+", current streak "+s.currentStreak+", best streak "+s.bestStreak);
      st.playerOrder.forEach(opp=>{
        if(opp===n)return;
        const h=(s.h2h||{})[opp]||{w:0,l:0};
        if(h.w+h.l>0)lines.push("  "+n+" vs "+opp+": "+h.w+" wins, "+h.l+" losses");
      });
    });
    return lines.join("\n");
  }

  // ── Bracket ──
  function shuffleArr(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
    return a;
  }

  function nextPowerOf2(n){let p=1;while(p<n)p*=2;return p}

  function buildBracket(seededPlayers){
    const size=nextPowerOf2(seededPlayers.length);
    // Pad with byes
    const padded=[...seededPlayers];
    while(padded.length<size)padded.push(null);
    // Build round 1 matchups
    const r1=[];
    for(let i=0;i<size;i+=2)r1.push({p1:padded[i],p2:padded[i+1],winner:padded[i+1]===null?padded[i]:null,isBye:padded[i+1]===null});
    const rounds=[r1];
    // Placeholder future rounds
    let prevSize=r1.length;
    while(prevSize>1){
      const round=[];
      for(let i=0;i<prevSize;i+=2)round.push({p1:null,p2:null,winner:null});
      rounds.push(round);
      prevSize=round.length;
    }
    setBracket({rounds,seededPlayers});
  }

  function randomBracket(){
    if(st.playerOrder.length<2){showToast("Need at least 2 players");return}
    buildBracket(shuffleArr(st.playerOrder));
  }

  async function aiBracket(){
    if(st.playerOrder.length<2){showToast("Need at least 2 players");return}
    setBracketLoading(true);
    try{
      const ctx=buildStatsContext();
      const prompt="Based on this ping pong tournament data, return ONLY a JSON array of player names in seeding order from best to worst (most likely to win first). No explanation, just the JSON array.\n\n"+ctx;
      const body={model:"claude-sonnet-4-6",max_tokens:200,messages:[{role:"user",content:prompt}]};
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const data=await res.json();
      const text=data.content&&data.content[0]?data.content[0].text:"[]";
      const cleaned=text.replace(/```json|```/g,"").trim();
      let seeded=JSON.parse(cleaned);
      // Filter to only valid players
      seeded=seeded.filter(n=>st.playerOrder.includes(n));
      // Add any missing players at end
      st.playerOrder.forEach(n=>{if(!seeded.includes(n))seeded.push(n)});
      buildBracket(seeded);
    }catch(e){
      showToast("AI seeding failed, using random");
      buildBracket(shuffleArr(st.playerOrder));
    }
    setBracketLoading(false);
  }

  function advanceWinner(roundIdx,matchIdx,winner){
    setBracket(prev=>{
      const rounds=prev.rounds.map(r=>r.map(m=>({...m})));
      rounds[roundIdx][matchIdx].winner=winner;
      // Place winner in next round
      if(roundIdx+1<rounds.length){
        const nextMatchIdx=Math.floor(matchIdx/2);
        const slot=matchIdx%2===0?"p1":"p2";
        rounds[roundIdx+1][nextMatchIdx][slot]=winner;
        rounds[roundIdx+1][nextMatchIdx].winner=null;
      }
      return{...prev,rounds};
    });
  }

                    {st.playerOrder.map(p=><th key={p} style={{fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",padding:"4px 7px",textAlign:"center"}}>{p}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {st.playerOrder.map(row=>(
                    <tr key={row}>
                      <td style={{fontSize:11,fontWeight:700,color:C.white,padding:"4px 10px 4px 0",textAlign:"right",whiteSpace:"nowrap"}}>{row}</td>
                      {st.playerOrder.map(col=>{
                        if(row===col)return<td key={col}><div style={{background:C.hi,borderRadius:6,minWidth:48,padding:"7px 5px"}}/></td>;
                        const net=netG(stats,row,col);
                        const h=(stats[row]?.h2h||{})[col]||{w:0,l:0};
                        return(
                          <td key={col}>
                            <div style={{background:net>0?"#0a1f0a":net<0?"#1f0a0a":C.hi,border:"1px solid "+(net>0?"#1a3a1a":net<0?"#3a1a1a":C.border),borderRadius:6,padding:"7px 5px",textAlign:"center",minWidth:48}}>
                              <div style={{fontSize:14,fontWeight:800,color:net>0?C.win:net<0?C.lose:C.even}}>{net>0?"+"+net:net===0?"--":net}</div>
                              {(h.w+h.l)>0&&<div style={{fontSize:9,color:C.muted,marginTop:1}}>{h.w}-{h.l}</div>}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:12}}>
              {[{col:C.win,lbl:"Ahead"},{col:C.lose,lbl:"Behind"},{col:C.even,lbl:"Even/none"}].map(({col,lbl})=>(
                <div key={lbl} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:C.muted}}>
                  <div style={{width:8,height:8,borderRadius:2,background:col}}/>{lbl}
                </div>
              ))}
            </div>
          </>
        )}

        {/* POSITION */}
        {tab==="mypos"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Select a player</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:16}}>
              {st.playerOrder.map(n=>(
                <button key={n} onClick={()=>setFocusPlayer(n)} style={{padding:"6px 13px",borderRadius:18,border:"1.5px solid "+(focusPlayer===n?C.white:C.border),background:focusPlayer===n?C.hi:"transparent",color:focusPlayer===n?C.white:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>{n}</button>
              ))}
            </div>
            {focusPlayer&&stats[focusPlayer]&&(()=>{
              const s=stats[focusPlayer];
              const wp=pct(s.wins,s.losses);
              const myRank=sortedPlayers.indexOf(focusPlayer);
              const opps=st.playerOrder.filter(n=>n!==focusPlayer).sort((a,b)=>netG(stats,focusPlayer,b)-netG(stats,focusPlayer,a));
              const ptPct=s.pointsScored+s.pointsConceded>0?Math.round(s.pointsScored/(s.pointsScored+s.pointsConceded)*100):null;
              return(
                <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,overflow:"hidden",marginBottom:12}}>
                  <div style={{borderBottom:"1px solid "+C.border,padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <div>
                      <div style={{fontWeight:900,fontSize:20,color:C.white}}>{focusPlayer}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{wp!==null?wp+"% win rate - ":"No games - "}{s.wins}W - {s.losses}L</div>
                    </div>
                    <div style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:C.gold,background:C.hi,borderRadius:6,padding:"3px 9px",border:"1px solid "+C.border}}>#{myRank+1} of {st.playerOrder.length}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",padding:"5px 14px",borderBottom:"1px solid "+C.border,background:C.hi}}>
                    <div style={{flex:1,fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Opponent</div>
                    <div style={{minWidth:38,textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Net</div>
                    <div style={{minWidth:52,textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>W-L</div>
                    <div style={{minWidth:44,textAlign:"right",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Win%</div>
                  </div>
                  {opps.map(opp=>{
                    const net=netG(stats,focusPlayer,opp);
                    const h=(s.h2h||{})[opp]||{w:0,l:0};
                    const op=pct(h.w,h.l);
                    return(
                      <div key={opp} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid "+C.border}}>
                        <div style={{flex:1,fontWeight:600,fontSize:13}}>{opp}</div>
                        <div style={{fontWeight:800,fontSize:15,minWidth:38,textAlign:"center",color:net>0?C.win:net<0?C.lose:C.even}}>{net>0?"+"+net:net===0?"--":net}</div>
                        <div style={{fontSize:11,color:C.muted,minWidth:52,textAlign:"center"}}>{h.w}-{h.l}</div>
                        <div style={{fontWeight:800,fontSize:14,minWidth:44,textAlign:"right",color:op===null?C.even:op>=50?C.win:C.lose}}>{op!==null?op+"%":"--"}</div>
                      </div>
                    );
                  })}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderTop:"1px solid "+C.border}}>
                    {[{val:wp!==null?wp+"%":"--",lbl:"Win Rate"},{val:s.bestStreak||0,lbl:"Best Streak"},{val:ptPct!==null?ptPct+"%":"--",lbl:"Point %"}].map(({val,lbl},i)=>(
                      <div key={lbl} style={{padding:"10px 14px",borderRight:i===2?"none":"1px solid "+C.border}}>
                        <div style={{fontWeight:900,fontSize:18,color:C.white}}>{val}</div>
                        <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginTop:2}}>{lbl}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
            {!focusPlayer&&<div style={{color:C.muted,fontSize:13}}>Tap a player above to see their breakdown.</div>}
          </>
        )}

        {/* HISTORY */}
        {tab==="history"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>
              {displayHistory.length} game{displayHistory.length!==1?"s":""}{histFilter?" with "+histFilter:""} - tap to edit
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              <button style={{padding:"5px 11px",borderRadius:14,border:"1px solid "+(histFilter?"":C.white),background:histFilter?"transparent":C.hi,color:histFilter?C.muted:C.white,fontWeight:600,fontSize:11,cursor:"pointer"}} onClick={()=>setHistFilter("")}>All</button>
              {st.playerOrder.map(n=>(
                <button key={n} style={{padding:"5px 11px",borderRadius:14,border:"1px solid "+(histFilter===n?C.white:C.border),background:histFilter===n?C.hi:"transparent",color:histFilter===n?C.white:C.muted,fontWeight:600,fontSize:11,cursor:"pointer"}} onClick={()=>setHistFilter(histFilter===n?"":n)}>{n}</button>
              ))}
            </div>
            <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",textAlign:"center"}}>
                <button style={{background:"none",border:"1px dashed "+C.border,color:C.mutedHi,fontWeight:700,fontSize:12,cursor:"pointer",padding:"7px 18px",borderRadius:8,width:"100%"}} onClick={openAdd}>+ Add a game</button>
              </div>
              {displayHistory.length===0&&<div style={{padding:"20px 14px",color:C.muted,fontSize:13,textAlign:"center"}}>No games logged yet.</div>}
              {displayHistory.slice(0,showAllHistory?10000:50).map(h=>(
                <div key={h.id} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 12px",borderTop:"1px solid "+C.border,cursor:"pointer"}} onClick={()=>openEdit(h)}>
                  <div style={{fontWeight:700,fontSize:13,color:C.win,flex:1}}>{h.winner}</div>
                  <div style={{fontSize:11,color:C.muted,minWidth:32,textAlign:"center"}}>{h.winScore!=null?h.winScore+"-"+h.loseScore:"W"}</div>
                  <div style={{fontWeight:600,fontSize:13,color:C.lose,flex:1,textAlign:"right"}}>{h.loser}</div>
                  <div style={{fontSize:10,color:C.muted,marginLeft:4,whiteSpace:"nowrap"}}>{fmtTime(h.ts)}</div>
                  <div style={{fontSize:12,color:C.muted,marginLeft:2,opacity:0.5}}>edit</div>
                </div>
              ))}
              {!showAllHistory&&displayHistory.length>50&&(
                <div style={{textAlign:"center",padding:"12px"}}>
                  <button style={{background:"none",border:"none",color:C.mutedHi,fontWeight:700,fontSize:13,cursor:"pointer"}} onClick={()=>setShowAllHistory(true)}>Show all {displayHistory.length}</button>
                </div>
              )}
            </div>
            <div style={{marginTop:10}}>
              <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:12,color:C.muted,borderRadius:10}} onClick={openBulk}>+ Bulk add past games</button>
            </div>
          </>
        )}
      </div>

      {/* GAME MODAL */}
      {gameModal&&(
        <div style={S.overlay} onClick={()=>setGameModal(null)}>
          <div className="slide-in" style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:4}}>
              {gameModal.mode==="edit"?"Edit Game":gameModal.mode==="bulk"?"Bulk Add Past Games":"Log a Game"}
            </div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
              {gameModal.mode==="edit"&&"Change winner, loser, score, or date -- or delete."}
              {gameModal.mode==="bulk"&&"Log multiple wins for the same person at once."}
              {gameModal.mode==="add"&&"Log a completed game. Score is optional."}
            </div>
            <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Winner</label>
            <select style={{...inp(),cursor:"pointer",marginBottom:12}} value={lgWinner} onChange={e=>{setLgWinner(e.target.value);if(e.target.value===lgLoser)setLgLoser("")}}>
              <option value="">Select winner...</option>
              {st.playerOrder.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
            <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Loser</label>
            <select style={{...inp(),cursor:"pointer",marginBottom:12}} value={lgLoser} onChange={e=>setLgLoser(e.target.value)}>
              <option value="">Select loser...</option>
              {st.playerOrder.filter(n=>n!==lgWinner).map(n=><option key={n} value={n}>{n}</option>)}
            </select>
            <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Score (optional)</label>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <input style={{...inp(),flex:1}} type="number" placeholder="Winner pts" value={lgWinScore} onChange={e=>setLgWinScore(e.target.value)}/>
              <input style={{...inp(),flex:1}} type="number" placeholder="Loser pts" value={lgLoseScore} onChange={e=>setLgLoseScore(e.target.value)}/>
            </div>
            {gameModal.mode==="bulk"&&(
              <>
                <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Number of wins for {lgWinner||"winner"}</label>
                <input style={{...inp(),marginBottom:12}} type="number" min={1} max={500} placeholder="e.g. 8" value={lgBulk===1?"":lgBulk} onChange={e=>setLgBulk(e.target.value===''?'':e.target.value)} onBlur={e=>{const v=parseInt(e.target.value);setLgBulk(isNaN(v)||v<1?1:v>500?500:v)}}/>
              </>
            )}
            <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Date (optional)</label>
            <input style={{...inp()}} type="date" value={lgDate} onChange={e=>setLgDate(e.target.value)}/>
            <button style={{...Btn(canLog?C.white:C.hi,canLog?C.bg:C.muted),width:"100%",padding:"12px",fontSize:15,borderRadius:10,marginTop:14}} disabled={!canLog} onClick={submitGame}>
              {gameModal.mode==="bulk"&&lgBulk>1?"Add "+lgBulk+" wins for "+(lgWinner||"winner"):gameModal.mode==="edit"?"Save Changes":"Save Game"}
            </button>
            <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:13,borderRadius:10,marginTop:8,color:C.muted}} onClick={()=>setGameModal(null)}>Cancel</button>
            {gameModal.mode==="edit"&&(
              <>
                <div style={{borderTop:"1px solid "+C.border,margin:"14px 0"}}/>
                <button style={{...OBtn(C.lose+"44"),width:"100%",padding:"10px",fontSize:13,borderRadius:10,color:C.lose}} onClick={()=>deleteGame(gameModal.game.id)}>Delete this game</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* SHARE MODAL */}
      {showShare&&(
        <div style={S.overlay} onClick={()=>setShowShare(false)}>
          <div className="slide-in" style={{...S.modal,maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:4}}>Share Tournament</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.6}}>Share the code or link -- anyone who joins can see stats live.</div>

            {/* JOIN CODE */}
            <div style={{background:C.hi,border:"1px solid "+C.border,borderRadius:12,padding:"14px",marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Join Code</div>
              <div style={{fontSize:40,fontWeight:900,color:C.gold,letterSpacing:"0.2em",lineHeight:1,marginBottom:10,fontFamily:"monospace"}}>{st.joinCode||"------"}</div>
              <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Friends type this code in the app to join instantly</div>
              {st.joinCode
                ?<button style={{...Btn(C.gold,C.bg),padding:"8px 20px",fontSize:13,borderRadius:8,fontWeight:800}} onClick={copyJoinCode}>Copy Code</button>
                :<button style={{...Btn(C.gold,C.bg),padding:"8px 20px",fontSize:13,borderRadius:8,fontWeight:800}} onClick={()=>generateCodeForTournament(activeTid)}>Generate Code</button>
              }
            </div>

            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Or share a link</div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input id="share-link-input" readOnly value={getShareLink()} style={{...inp(),flex:1,fontSize:11,color:C.mutedHi,padding:"9px 10px"}} onFocus={e=>e.target.select()}/>
              <button style={{...Btn(copied?C.win:C.white,copied?"#000":C.bg),padding:"9px 14px",fontSize:12,borderRadius:9,whiteSpace:"nowrap"}} onClick={copyLink}>{copied?"Copied!":"Copy"}</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button style={{...Btn("#1b8a4e",C.white),flex:1,padding:"11px",fontSize:13,borderRadius:10}} onClick={shareSMS}>Text Message</button>
              {navigator.share&&<button style={{...Btn(C.hi,C.white),border:"1px solid "+C.border,flex:1,padding:"11px",fontSize:13,borderRadius:10}} onClick={()=>navigator.share({title:"EL PONG",text:"Join \""+st.name+"\" on EL PONG! Code: "+st.joinCode,url:getShareLink()})}>Share...</button>}
            </div>
            <div style={{borderTop:"1px solid "+C.border,margin:"12px 0"}}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em"}}>
                Members ({(st.members||[]).length})
              </div>
              {isHost()&&<div style={{fontSize:10,color:C.gold,fontWeight:700}}>You are Host</div>}
              {!isHost()&&myRole()==="editor"&&<div style={{fontSize:10,color:C.win,fontWeight:700}}>You are a Member</div>}
              {!isHost()&&myRole()==="viewer"&&<div style={{fontSize:10,color:C.muted,fontWeight:700}}>You are a Viewer</div>}
            </div>
            {(st.members||[]).length===0&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>No members yet. Share the link or code to invite people.</div>}
            {(st.members||[]).map(m=>(
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid "+C.border}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:m.role==="host"?C.gold:m.id===myId?"#2563eb":C.hi,border:"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:m.role==="host"?C.bg:C.white,flexShrink:0}}>
                  {(m.name||"?").charAt(0).toUpperCase()}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.white}}>
                    {m.name||"Unknown"}{m.id===myId?" (you)":""}
                    {m.role==="host"&&<span style={{fontSize:9,color:C.gold,marginLeft:5,fontWeight:700}}>HOST</span>}
                  </div>
                  <div style={{fontSize:10,color:m.role==="host"?C.gold:m.role==="editor"?C.win:C.muted}}>
                    {m.role==="host"?"Host — full control":m.role==="editor"?"Member — can log games":"Viewer — cannot log games"}
                  </div>
                </div>
                {isHost()&&m.id!==myId&&(
                  <div style={{display:"flex",gap:4}}>
                    {m.role==="viewer"&&(
                      <button style={{fontSize:10,padding:"4px 8px",borderRadius:6,border:"1px solid "+C.win+"55",background:"transparent",color:C.win,cursor:"pointer",fontWeight:700}}
                        onClick={()=>{
                          const updated=(st.members||[]).map(x=>x.id===m.id?{...x,role:"editor"}:x);
                          updateSt(t=>({...t,members:updated}));
                          showToast(m.name+" can now log games");
                        }}>Promote</button>
                    )}
                    {m.role==="editor"&&(
                      <button style={{fontSize:10,padding:"4px 8px",borderRadius:6,border:"1px solid "+C.border,background:"transparent",color:C.muted,cursor:"pointer"}}
                        onClick={()=>{
                          const updated=(st.members||[]).map(x=>x.id===m.id?{...x,role:"viewer"}:x);
                          updateSt(t=>({...t,members:updated}));
                          showToast(m.name+" is now a viewer");
                        }}>Demote</button>
                    )}
                    <button style={{fontSize:10,padding:"4px 8px",borderRadius:6,border:"1px solid "+C.lose+"55",background:"transparent",color:C.lose,cursor:"pointer",fontWeight:700}}
                      onClick={()=>{
                        if(!window.confirm("Remove "+m.name+" from this tournament?"))return;
                        const updated=(st.members||[]).filter(x=>x.id!==m.id);
                        updateSt(t=>({...t,members:updated}));
                        showToast(m.name+" removed");
                      }}>Remove</button>
                    {m.role!=="host"&&(
                      <button style={{fontSize:10,padding:"4px 8px",borderRadius:6,border:"1px solid "+C.gold+"55",background:"transparent",color:C.gold,cursor:"pointer",fontWeight:700}}
                        onClick={()=>{
                          if(!window.confirm("Make "+m.name+" a host? They will have full control."))return;
                          const updated=(st.members||[]).map(x=>x.id===m.id?{...x,role:"host"}:x);
                          updateSt(t=>({...t,members:updated,hostId:m.id}));
                          showToast(m.name+" is now a host!");
                        }}>Make Host</button>
                    )}
                  </div>
                )}
              </div>
            ))}
            <button style={{...Btn(C.hi,C.muted),border:"1px solid "+C.border,width:"100%",padding:"10px",fontSize:13,borderRadius:10,marginTop:10}} onClick={()=>setShowShare(false)}>Done</button>
          </div>
        </div>
      )}

      {/* PLAYERS MODAL */}
      {showPlayers&&(
        <div style={S.overlay} onClick={()=>setShowPlayers(false)}>
          <div className="slide-in" style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:16}}>Players -- {st.name}</div>
            {st.playerOrder.map((name,i)=>(
              <div key={name} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.border}}>
                {editIdx===i?(
                  <>
                    <input style={{...inp(),flex:1,padding:"7px 10px",fontSize:13}} value={editName} autoFocus onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&savePlayerEdit(i)}/>
                    <button style={{...Btn(C.win,"#000"),padding:"7px 11px",fontSize:11,borderRadius:7,marginLeft:6}} onClick={()=>savePlayerEdit(i)}>Save</button>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"6px 8px"}} onClick={()=>setEditIdx(null)}>x</button>
                  </>
                ):(
                  <>
                    <div style={{flex:1,fontWeight:600,fontSize:14}}>{name}</div>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"2px 6px"}} onClick={()=>{setEditIdx(i);setEditName(name)}}>edit</button>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:C.lose,fontSize:13,padding:"2px 6px"}} onClick={()=>removePlayer(name)}>remove</button>
                  </>
                )}
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <input style={{...inp(),flex:1,fontSize:13}} placeholder="New player name..." value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPlayer()}/>
              <button style={{...Btn(C.white,C.bg),padding:"9px 14px",fontSize:13,borderRadius:10}} onClick={addPlayer}>Add</button>
            </div>
            <button style={{...Btn(C.hi,C.white),border:"1px solid "+C.border,width:"100%",marginTop:14,padding:"11px",fontSize:14,borderRadius:10}} onClick={()=>setShowPlayers(false)}>Done</button>
            <button style={{...OBtn(C.lose+"44"),width:"100%",marginTop:8,padding:"9px",fontSize:12,borderRadius:10,color:C.lose}} onClick={()=>{setShowPlayers(false);clearAll()}}>Reset all stats for {st.name}</button>
          </div>
        </div>
      )}

      {/* NEW TOURNAMENT MODAL */}
      {showNewTourn&&(
        <div style={S.overlay} onClick={()=>setShowNewTourn(false)}>
          <div className="slide-in" style={{...S.modal,maxWidth:340}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:4}}>New Tournament</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Give it a name -- you can change this later.</div>
            <input style={{...inp(),marginBottom:14}} placeholder="e.g. Summer League..." value={newTournName} autoFocus onChange={e=>setNewTournName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createTournament(newTournName)}/>
            <button style={{...Btn(C.white,C.bg),width:"100%",padding:"12px",fontSize:14,borderRadius:10,marginBottom:8}} onClick={()=>createTournament(newTournName)}>Create Tournament</button>
            <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:13,borderRadius:10,color:C.muted}} onClick={()=>setShowNewTourn(false)}>Cancel</button>
          </div>
        </div>
      )}

      {/* PROFILE TAB */}
      {tab==="profile"&&(
        <div key="profile" className="fade-in" style={{padding:"16px 14px 0",maxWidth:600,margin:"0 auto"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16}}>Your Profile</div>

          {/* Avatar */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:24}}>
            <div style={{width:72,height:72,borderRadius:"50%",background:"#2563eb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,fontWeight:900,color:C.white,marginBottom:10,border:"2px solid "+C.border}}>
              {myName?myName.charAt(0).toUpperCase():"?"}
            </div>
            <div style={{fontSize:20,fontWeight:900,color:C.white}}>{myName||"No name set"}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3}}>ID: {myId.slice(0,8)}...</div>
          </div>

          {/* Change name */}
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"14px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:C.white,marginBottom:10}}>Display Name</div>
            <div style={{display:"flex",gap:8}}>
              <input
                style={{...inp(),flex:1,fontSize:13}}
                placeholder={myName||"Enter your name..."}
                value={profileNameInput}
                onChange={e=>setProfileNameInput(e.target.value)}
                onKeyDown={e=>{
                  if(e.key==="Enter"&&profileNameInput.trim()){
                    const n=profileNameInput.trim();
                    setMyName(n);lsSet("elpong_username",n);
                    registerMember(n,"editor");
                    setProfileNameInput("");
                    showToast("Name updated to "+n);
                  }
                }}
              />
              <button
                style={{...Btn(profileNameInput.trim()?C.white:C.hi,profileNameInput.trim()?C.bg:C.muted),padding:"9px 14px",fontSize:13,borderRadius:10}}
                disabled={!profileNameInput.trim()}
                onClick={()=>{
                  const n=profileNameInput.trim();
                  if(!n)return;
                  setMyName(n);lsSet("elpong_username",n);
                  registerMember(n,"editor");
                  setProfileNameInput("");
                  showToast("Name updated to "+n);
                }}
              >Save</button>
            </div>
          </div>

          {/* Your tournaments */}
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"14px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:C.white,marginBottom:10}}>Your Tournaments</div>
            {tournaments.length===0&&<div style={{fontSize:12,color:C.muted}}>No tournaments yet.</div>}
            {tournaments.map(t=>{
              const isActive=t.id===activeTid;
              return(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid "+C.border}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:isActive?700:500,color:isActive?C.white:C.mutedHi}}>{t.name}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>
                      {t.history.length} games · {(t.members||[]).length} members
                      {t.joinCode?" · Code: "+t.joinCode:" · No code yet"}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {!t.joinCode&&<button style={{...Btn(C.gold,C.bg),padding:"5px 10px",fontSize:10,borderRadius:7}} onClick={()=>generateCodeForTournament(t.id)}>Gen Code</button>}
                    {isActive
                      ?<div style={{fontSize:10,color:C.win,fontWeight:700}}>Active</div>
                      :<button style={{...OBtn(C.border),padding:"5px 10px",fontSize:11,color:C.mutedHi,borderRadius:7}} onClick={()=>switchToTournament(t.id)}>Switch</button>
                    }
                  </div>
                </div>
              );
            })}
          </div>

          {/* Join a new tournament */}
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"14px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:C.white,marginBottom:10}}>Join a Tournament</div>
            <button style={{...Btn(C.gold,C.bg),width:"100%",padding:"11px",fontSize:13,borderRadius:10,marginBottom:8}} onClick={()=>setShowJoinCode(true)}>Enter Join Code</button>
          </div>

          {/* Creator code — secret host override */}
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"14px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:C.white,marginBottom:4}}>Creator Code</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Enter a secret code to become host of any tournament you are in.</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input
                style={{...inp(),flex:1,fontSize:13,letterSpacing:"0.1em"}}
                placeholder="Enter code..."
                value={creatorCodeInput}
                onChange={e=>setCreatorCodeInput(e.target.value)}
                onKeyDown={e=>{
                  if(e.key!=="Enter")return;
                  if(creatorCodeInput.trim()==="ELPONG2025"){
                    // Make user host of active tournament
                    const updated=(st.members||[]).map(m=>m.id===myId?{...m,role:"host"}:m);
                    const alreadyMember=(st.members||[]).find(m=>m.id===myId);
                    const finalMembers=alreadyMember?updated:[...updated,{id:myId,name:myName||"Host",role:"host",joinedAt:Date.now()}];
                    updateSt(t=>({...t,members:finalMembers,hostId:myId}));
                    setCreatorCodeMsg("You are now the host of "+st.name+"!");
                    setCreatorCodeInput("");
                  }else{
                    setCreatorCodeMsg("Invalid code.");
                  }
                }}
              />
              <button
                style={{...Btn(creatorCodeInput.trim()?C.gold:C.hi,creatorCodeInput.trim()?C.bg:C.muted),padding:"9px 14px",fontSize:13,borderRadius:10}}
                onClick={()=>{
                  if(creatorCodeInput.trim()==="ELPONG2025"){
                    const updated=(st.members||[]).map(m=>m.id===myId?{...m,role:"host"}:m);
                    const alreadyMember=(st.members||[]).find(m=>m.id===myId);
                    const finalMembers=alreadyMember?updated:[...updated,{id:myId,name:myName||"Host",role:"host",joinedAt:Date.now()}];
                    updateSt(t=>({...t,members:finalMembers,hostId:myId}));
                    setCreatorCodeMsg("You are now the host of "+st.name+"!");
                    setCreatorCodeInput("");
                  }else{
                    setCreatorCodeMsg("Invalid code.");
                  }
                }}
              >Apply</button>
            </div>
            {creatorCodeMsg&&(
              <div style={{fontSize:12,padding:"6px 10px",borderRadius:7,background:creatorCodeMsg.includes("Invalid")?C.lose+"11":C.win+"11",color:creatorCodeMsg.includes("Invalid")?C.lose:C.win}}>
                {creatorCodeMsg}
              </div>
            )}
          </div>
        </div>
      )}

      {/* BRACKET TAB */}
      {tab==="bracket"&&(
        <div key="bracket" className="fade-in" style={{padding:"16px 14px 0",maxWidth:600,margin:"0 auto"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Tournament Bracket</div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button style={{...Btn(C.white,C.bg),flex:1,padding:"11px",fontSize:13,borderRadius:10}} onClick={randomBracket}>Random Bracket</button>
            <button style={{...Btn(C.gold,C.bg),flex:1,padding:"11px",fontSize:13,borderRadius:10,opacity:bracketLoading?0.6:1}} onClick={aiBracket} disabled={bracketLoading}>
              {bracketLoading?"AI thinking...":"AI Seed Bracket"}
            </button>
          </div>
          {!bracket&&(
            <div style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:13,background:C.surface,borderRadius:14,border:"1px solid "+C.border}}>
              Generate a bracket above. AI Seed uses win rates and head-to-head records to seed players fairly.
            </div>
          )}
          {bracket&&(
            <>
              <div style={{overflowX:"auto",paddingBottom:16}}>
                <div style={{display:"flex",gap:0,minWidth:bracket.rounds.length*160}}>
                  {bracket.rounds.map((round,ri)=>(
                    <div key={ri} style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"space-around",minWidth:150,paddingRight:ri<bracket.rounds.length-1?8:0}}>
                      <div style={{fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",textAlign:"center",marginBottom:8,paddingLeft:8}}>
                        {ri===bracket.rounds.length-1?"Final":ri===bracket.rounds.length-2?"Semi":ri===0?"Round 1":"Round "+(ri+1)}
                      </div>
                      {round.map((match,mi)=>{
                        const topH=Math.pow(2,ri+1);
                        const spacing=Math.pow(2,ri)*24;
                        return(
                          <div key={mi} style={{marginBottom:spacing,position:"relative"}}>
                            {/* Connector line */}
                            {ri<bracket.rounds.length-1&&(
                              <div style={{position:"absolute",right:-8,top:"50%",width:8,height:1,background:C.border}}/>
                            )}
                            <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:8,overflow:"hidden"}}>
                              {[match.p1,match.p2].map((player,pi)=>(
                                <div key={pi}
                                  onClick={()=>player&&!match.isBye&&advanceWinner(ri,mi,player)}
                                  style={{
                                    padding:"8px 10px",
                                    background:match.winner===player&&player?C.win+"22":pi===0?"transparent":C.hi,
                                    borderTop:pi===1?"1px solid "+C.border:"none",
                                    cursor:player&&!match.isBye?"pointer":"default",
                                    display:"flex",alignItems:"center",gap:6,
                                    transition:"background .15s",
                                  }}>
                                  {match.winner===player&&player&&<span style={{fontSize:9,color:C.win}}>*</span>}
                                  <span style={{fontSize:12,fontWeight:match.winner===player?800:500,color:player?C.white:C.muted,flex:1}}>
                                    {player||"BYE"}
                                  </span>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>
              {/* Champion */}
              {(()=>{
                const finalRound=bracket.rounds[bracket.rounds.length-1];
                const champ=finalRound&&finalRound[0]&&finalRound[0].winner;
                if(!champ)return null;
                return(
                  <div style={{background:"#1a1500",border:"2px solid "+C.gold,borderRadius:14,padding:"16px",textAlign:"center",marginTop:8}}>
                    <div style={{fontSize:11,color:C.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Champion</div>
                    <div style={{fontSize:26,fontWeight:900,color:C.gold}}>{champ}</div>
                  </div>
                );
              })()}
              <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:12,color:C.muted,borderRadius:10,marginTop:12}} onClick={()=>setBracket(null)}>Clear Bracket</button>
              <div style={{fontSize:10,color:C.muted,textAlign:"center",marginTop:8}}>Tap a player name to advance them as the winner</div>
            </>
          )}
        </div>
      )}

      {/* AI CHAT BUBBLE */}
      {!showAI&&(
        <button
          onClick={()=>setShowAI(true)}
          style={{position:"fixed",bottom:24,left:20,zIndex:90,width:54,height:54,borderRadius:"50%",border:"none",background:"linear-gradient(135deg,#2563eb,#7c3aed)",color:"#fff",fontSize:22,cursor:"pointer",boxShadow:"0 4px 20px rgba(37,99,235,0.5)",display:"flex",alignItems:"center",justifyContent:"center"}}
        >
          💬
        </button>
      )}

      {/* AI CHAT PANEL */}
      {showAI&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,top:"auto",zIndex:300,display:"flex",flexDirection:"column",height:"70vh",maxHeight:560,background:C.surface,borderTop:"1px solid "+C.border,borderRadius:"18px 18px 0 0",boxShadow:"0 -8px 32px rgba(0,0,0,0.6)"}}>
          {/* Panel header */}
          <div style={{display:"flex",alignItems:"center",padding:"14px 16px 12px",borderBottom:"1px solid "+C.border,flexShrink:0}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#2563eb,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,marginRight:10}}>AI</div>
            <div>
              <div style={{fontWeight:800,fontSize:15,color:C.white}}>EL PONG Analyst</div>
              <div style={{fontSize:10,color:C.muted}}>Ask about stats, predictions, rivalries...</div>
            </div>
            <button onClick={()=>setShowAI(false)} style={{marginLeft:"auto",background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",padding:"4px 8px"}}>x</button>
          </div>

          {/* Messages */}
          <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
            {aiMessages.length===0&&(
              <div style={{color:C.muted,fontSize:13,textAlign:"center",marginTop:20,lineHeight:1.7}}>
                Ask me anything about your tournament!
                <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:6}}>
                  {["Who is most likely to win a match against Alex?","What are the biggest rivalries?","Who should I bet on to win the tournament?","Create a seeding based on current stats"].map(q=>(
                    <button key={q} onClick={()=>{setAiInput(q)}} style={{...OBtn(C.border),padding:"8px 12px",fontSize:11,color:C.mutedHi,borderRadius:8,textAlign:"left"}}>{q}</button>
                  ))}
                </div>
              </div>
            )}
            {aiMessages.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"82%",padding:"10px 13px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.role==="user"?"#2563eb":C.hi,color:C.white,fontSize:13,lineHeight:1.5}}>
                  {m.content}
                </div>
              </div>
            ))}
            {aiLoading&&(
              <div style={{display:"flex",justifyContent:"flex-start"}}>
                <div style={{padding:"10px 14px",borderRadius:"16px 16px 16px 4px",background:C.hi,color:C.muted,fontSize:13}} className="pulse">thinking...</div>
              </div>
            )}
            <div ref={aiEndRef}/>
          </div>

          {/* Input */}
          <div style={{display:"flex",gap:8,padding:"10px 14px",borderTop:"1px solid "+C.border,flexShrink:0,background:C.surface}}>
            <input
              style={{...inp(),flex:1,fontSize:13,padding:"9px 12px"}}
              placeholder="Ask about stats, predictions..."
              value={aiInput}
              onChange={e=>setAiInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendAIMessage()}
            />
            <button style={{...Btn(aiLoading||!aiInput.trim()?"#1a1a1a":"#2563eb","#fff"),padding:"9px 16px",fontSize:13,borderRadius:10,opacity:aiLoading||!aiInput.trim()?0.5:1}} onClick={sendAIMessage} disabled={aiLoading||!aiInput.trim()}>Send</button>
          </div>
        </div>
      )}

            {/* VIEWER BANNER — shown when you are a viewer in a tournament */}
      {myRole()==="viewer"&&activeTid&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#1a1500",borderTop:"2px solid "+C.gold,padding:"10px 16px",zIndex:80,display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,fontSize:12,color:C.gold,fontWeight:700}}>
            You are a viewer — ask the host to promote you to editor
          </div>
          <button style={{...Btn(C.gold,"#000"),padding:"7px 12px",fontSize:11,borderRadius:8}} onClick={()=>setShowShare(true)}>Members</button>
        </div>
      )}

      {/* NAME MODAL */}
      {showNameModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div className="slide-in" style={{background:C.surface,border:"1px solid "+C.border,borderRadius:18,padding:"28px 22px 22px",width:"100%",maxWidth:340,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:12}}>🏓</div>
            <div style={{fontSize:20,fontWeight:900,color:C.white,marginBottom:6}}>Welcome to EL PONG</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:22,lineHeight:1.6}}>Enter your name so everyone knows who you are in the tournament.</div>
            <input
              style={{...inp(),fontSize:15,padding:"12px 14px",marginBottom:14,textAlign:"center"}}
              placeholder="Your name..."
              value={nameInput}
              autoFocus
              onChange={e=>setNameInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&saveUsername()}
            />
            <button style={{...Btn(nameInput.trim()?C.white:C.hi,nameInput.trim()?C.bg:C.muted),width:"100%",padding:"13px",fontSize:15,borderRadius:10,marginBottom:8}} onClick={saveUsername} disabled={!nameInput.trim()}>
              Join as {nameInput.trim()||"..."}
            </button>
            {myName&&<button style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",padding:"6px"}} onClick={()=>setShowNameModal(false)}>Cancel (keep "{myName}")</button>}
          </div>
        </div>
      )}

      {/* JOIN CODE MODAL */}
      {showJoinCode&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div className="slide-in" style={{background:C.surface,border:"1px solid "+C.border,borderRadius:18,padding:"26px 20px 20px",width:"100%",maxWidth:340,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:10}}>🔑</div>
            <div style={{fontSize:19,fontWeight:900,color:C.white,marginBottom:6}}>Enter Join Code</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.6}}>Ask the tournament creator for their 6-character code.</div>
            <input
              style={{...inp(),fontSize:26,padding:"14px",marginBottom:8,textAlign:"center",letterSpacing:"0.3em",fontWeight:900,fontFamily:"monospace",textTransform:"uppercase"}}
              placeholder="ABC123"
              value={joinCodeInput}
              maxLength={6}
              autoFocus
              onChange={e=>setJoinCodeInput(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==="Enter"&&joinByCode()}
            />
            {joinCodeError&&<div style={{fontSize:12,color:C.lose,marginBottom:10,padding:"6px 10px",background:C.lose+"11",borderRadius:7}}>{joinCodeError}</div>}
            <button
              style={{...Btn(joinCodeInput.length===6?C.gold:C.hi,joinCodeInput.length===6?C.bg:C.muted),width:"100%",padding:"13px",fontSize:15,borderRadius:10,marginBottom:8,opacity:joinCodeLoading?0.6:1}}
              disabled={joinCodeInput.length!==6||joinCodeLoading}
              onClick={joinByCode}
            >
              {joinCodeLoading?"Searching...":"Join Tournament"}
            </button>
            <button style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",padding:"6px"}} onClick={()=>{setShowJoinCode(false);setJoinCodeInput("");setJoinCodeError("")}}>Cancel</button>
          </div>
        </div>
      )}

      {toast&&<div className="toast-pop" style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:C.el,border:"1px solid "+C.border,color:C.white,fontWeight:700,fontSize:13,padding:"10px 20px",borderRadius:28,boxShadow:"0 4px 24px rgba(0,0,0,0.5)",zIndex:999,whiteSpace:"nowrap"}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
