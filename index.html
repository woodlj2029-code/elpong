<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{background:#000;font-family:'Inter','Segoe UI',system-ui,sans-serif;color:#f0f0f0}

    @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .toast-pop{animation:toastPop .2s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(12px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

    button:active{transform:scale(.94)!important;opacity:.85}
    input:focus,select:focus{outline:none;border-color:#555!important}
    .pulse{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

/* ═══════════════════════════════════════════════════════════
   PALETTE
═══════════════════════════════════════════════════════════ */
const C={
  bg:"#000",surface:"#111",hi:"#1a1a1a",el:"#222",
  border:"#2a2a2a",borderHi:"#3a3a3a",
  white:"#f0f0f0",muted:"#666",mutedHi:"#999",
  win:"#22c55e",lose:"#ef4444",even:"#555",gold:"#f5c518",
  blue:"#3b82f6",
};

/* ═══════════════════════════════════════════════════════════
   LOCAL STORAGE
═══════════════════════════════════════════════════════════ */
const LS_CONFIG="elpong_config_v1";
const LS_SAVED="elpong_saved_v1";
const LS_LEGACY="elpong_v1";
const LS_LEGACY2="pingroyale_v3";

function lsGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function getConfig(){return lsGet(LS_CONFIG)||{url:"",key:""}}
function setConfig(c){lsSet(LS_CONFIG,c)}
function getSaved(){return lsGet(LS_SAVED)||[]} // [{id,name,savedAt}]
function setSaved(s){lsSet(LS_SAVED,s)}

/* ═══════════════════════════════════════════════════════════
   SUPABASE CLIENT (lazy)
═══════════════════════════════════════════════════════════ */
let _sb=null;
function getSB(){
  if(_sb)return _sb;
  const c=getConfig();
  if(c.url&&c.key){
    _sb=supabase.createClient(c.url,c.key);
    return _sb;
  }
  return null;
}
function resetSB(){_sb=null;}

/* ═══════════════════════════════════════════════════════════
   STATS ENGINE  (pure, no side-effects)
═══════════════════════════════════════════════════════════ */
function computeStats(playerOrder,history){
  const s={};
  playerOrder.forEach(n=>{
    s[n]={wins:0,losses:0,h2h:{},pointsScored:0,pointsConceded:0,currentStreak:0,bestStreak:0};
    playerOrder.forEach(m=>{if(m!==n)s[n].h2h[m]={w:0,l:0}});
  });
  const ord=[...history].sort((a,b)=>a.ts-b.ts);
  ord.forEach(g=>{
    const W=s[g.winner],L=s[g.loser];
    if(!W||!L)return;
    W.wins++;L.losses++;
    if(!W.h2h[g.loser])W.h2h[g.loser]={w:0,l:0};
    if(!L.h2h[g.winner])L.h2h[g.winner]={w:0,l:0};
    W.h2h[g.loser].w++;L.h2h[g.winner].l++;
    if(g.winScore!=null){W.pointsScored+=g.winScore;W.pointsConceded+=g.loseScore;L.pointsScored+=g.loseScore;L.pointsConceded+=g.winScore}
  });
  playerOrder.forEach(n=>{
    let cur=0,best=0;
    ord.forEach(g=>{
      if(g.winner===n){cur++;if(cur>best)best=cur}
      else if(g.loser===n)cur=0;
    });
    s[n].currentStreak=cur;s[n].bestStreak=best;
  });
  return s;
}
function netG(stats,a,b){const h=stats[a]?.h2h?.[b]||{w:0,l:0};return h.w-h.l}
function rankP(playerOrder,stats){
  return[...playerOrder].sort((a,b)=>{
    const sa=stats[a]||{wins:0,losses:0},sb=stats[b]||{wins:0,losses:0};
    const ta=sa.wins+sa.losses,tb=sb.wins+sb.losses;
    const pa=ta>0?sa.wins/ta:-1,pb=tb>0?sb.wins/tb:-1;
    if(pb!==pa)return pb-pa;
    return(sb.wins-sb.losses)-(sa.wins-sa.losses);
  });
}
function pct(w,l){if(w+l===0)return null;return Math.round(w/(w+l)*100)}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function fmtTime(ts){
  const d=new Date(ts),now=new Date(),diff=(now-d)/1000;
  if(diff<60)return"just now";
  if(diff<3600)return Math.floor(diff/60)+"m ago";
  if(diff<86400)return Math.floor(diff/3600)+"h ago";
  if(diff<604800)return Math.floor(diff/86400)+"d ago";
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:d.getFullYear()!==now.getFullYear()?"numeric":undefined});
}

/* ═══════════════════════════════════════════════════════════
   LEGACY MIGRATION
═══════════════════════════════════════════════════════════ */
function migrateLocal(){
  for(const key of[LS_LEGACY,LS_LEGACY2]){
    const d=lsGet(key);
    if(!d)continue;
    const po=d.playerOrder||(d.players?Object.keys(d.players):[]);
    const hist=(d.history||[]).map(h=>({...h,id:h.id||uid()}));
    if(po.length||hist.length)return{playerOrder:po,history:hist};
  }
  return null;
}

/* ═══════════════════════════════════════════════════════════
   STYLE HELPERS
═══════════════════════════════════════════════════════════ */
const inp=(extra={})=>({background:C.hi,color:C.white,border:"1px solid "+C.border,borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",width:"100%",...extra});
const Btn=(bg,col,extra={})=>({border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,background:bg,color:col,...extra});
const OBtn=(col,extra={})=>({border:"1px solid "+col,borderRadius:10,cursor:"pointer",fontWeight:700,background:"transparent",color:col,...extra});

/* ═══════════════════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════════════════ */
function SetupScreen({onDone}){
  const[url,setUrl]=useState("");
  const[key,setKey]=useState("");
  const[step,setStep]=useState(1);
  const[testing,setTesting]=useState(false);
  const[err,setErr]=useState("");

  async function test(){
    setTesting(true);setErr("");
    try{
      const sb=supabase.createClient(url.trim(),key.trim());
      const{error}=await sb.from("tournaments").select("id").limit(1);
      if(error&&error.code!=="PGRST116"&&!error.message.includes("does not exist")){
        // Try creating table
        setErr("Connected! Now run the SQL in Step 3, then click Save.");
        setTesting(false);return;
      }
      // Save config
      setConfig({url:url.trim(),key:key.trim()});
      resetSB();
      onDone();
    }catch(e){
      setErr("Could not connect. Double-check your URL and key.");
    }
    setTesting(false);
  }

  const stepStyle=(n)=>({
    background:step>=n?C.hi:C.surface,
    border:"1px solid "+(step>=n?C.borderHi:C.border),
    borderRadius:12,padding:"14px 16px",marginBottom:10,
    opacity:step>=n?1:0.5,
  });

  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"0 0 60px"}}>
      <div style={{background:C.surface,borderBottom:"1px solid "+C.border,padding:"16px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{fontSize:20}}>🏓</div>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:C.white,letterSpacing:"-0.5px"}}>EL PONG</div>
          <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.15em"}}>Setup — one time only</div>
        </div>
      </div>

      <div style={{maxWidth:520,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:13,color:C.mutedHi,lineHeight:1.6,marginBottom:20}}>
          To enable <strong style={{color:C.white}}>real-time sync</strong> and <strong style={{color:C.white}}>invite links</strong>, EL PONG needs a free Supabase database. This takes about 5 minutes and you only do it once.
        </div>

        {/* Step 1 */}
        <div style={stepStyle(1)}>
          <div style={{fontWeight:800,fontSize:14,color:C.white,marginBottom:6}}>Step 1 — Create a free Supabase account</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:10}}>
            Go to <strong style={{color:C.white}}>supabase.com</strong> → click "Start your project" → sign up with GitHub or email (free, no credit card).
          </div>
          <a href="https://supabase.com" target="_blank" style={{display:"inline-block",padding:"8px 16px",background:C.el,border:"1px solid "+C.border,borderRadius:8,color:C.white,fontSize:12,fontWeight:700,textDecoration:"none"}}>
            Open Supabase ↗
          </a>
          {step===1&&<button style={{...Btn(C.white,C.bg),marginLeft:10,padding:"8px 16px",fontSize:12,borderRadius:8}} onClick={()=>setStep(2)}>Done →</button>}
        </div>

        {/* Step 2 */}
        <div style={stepStyle(2)}>
          <div style={{fontWeight:800,fontSize:14,color:C.white,marginBottom:6}}>Step 2 — Create a new project</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:8}}>
            In Supabase dashboard: click <strong style={{color:C.white}}>"New Project"</strong> → give it any name (e.g. "elpong") → set a database password → choose any region → click "Create new project". Wait ~1 min for it to spin up.
          </div>
          {step===2&&<button style={{...Btn(C.white,C.bg),padding:"8px 16px",fontSize:12,borderRadius:8}} onClick={()=>setStep(3)}>Done →</button>}
        </div>

        {/* Step 3 */}
        <div style={stepStyle(3)}>
          <div style={{fontWeight:800,fontSize:14,color:C.white,marginBottom:6}}>Step 3 — Create the database table</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:10}}>
            In your project: go to <strong style={{color:C.white}}>SQL Editor</strong> (left sidebar) → click "New query" → paste this SQL → click "Run":
          </div>
          <div style={{background:"#0a0a0a",border:"1px solid "+C.border,borderRadius:8,padding:"12px 14px",fontFamily:"monospace",fontSize:11,color:"#a8d8a8",lineHeight:1.7,marginBottom:10,overflowX:"auto",whiteSpace:"pre"}}>
{"create table if not exists tournaments (\n  id text primary key,\n  name text not null default 'Tournament',\n  player_order jsonb not null default '[]',\n  history jsonb not null default '[]',\n  updated_at timestamptz default now()\n);\n\nalter table tournaments enable row level security;\n\ncreate policy \"Anyone can read\" on tournaments\n  for select using (true);\n\ncreate policy \"Anyone can insert\" on tournaments\n  for insert with check (true);\n\ncreate policy \"Anyone can update\" on tournaments\n  for update using (true);\n\nalter publication supabase_realtime add table tournaments;"}
          </div>
          <button
            onClick={()=>{
              const sql="create table if not exists tournaments (\n  id text primary key,\n  name text not null default 'Tournament',\n  player_order jsonb not null default '[]',\n  history jsonb not null default '[]',\n  updated_at timestamptz default now()\n);\nalter table tournaments enable row level security;\ndrop policy if exists \"Anyone can read\" on tournaments;\ndrop policy if exists \"Anyone can insert\" on tournaments;\ndrop policy if exists \"Anyone can update\" on tournaments;\ncreate policy \"Anyone can read\" on tournaments for select using (true);\ncreate policy \"Anyone can insert\" on tournaments for insert with check (true);\ncreate policy \"Anyone can update\" on tournaments for update using (true);\nalter publication supabase_realtime add table tournaments;";
              navigator.clipboard.writeText(sql).catch(()=>{});
            }}
            style={{...OBtn(C.border),padding:"7px 14px",fontSize:11,color:C.mutedHi,borderRadius:7,marginBottom:10}}
          >📋 Copy SQL</button>
          {step===3&&<button style={{...Btn(C.white,C.bg),marginLeft:8,padding:"8px 16px",fontSize:12,borderRadius:8}} onClick={()=>setStep(4)}>Done →</button>}
        </div>

        {/* Step 4 */}
        <div style={stepStyle(4)}>
          <div style={{fontWeight:800,fontSize:14,color:C.white,marginBottom:6}}>Step 4 — Paste your project keys</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:12}}>
            In Supabase: go to <strong style={{color:C.white}}>Project Settings → API</strong> (left sidebar). Copy and paste both values below.
          </div>
          <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>
            Project URL <span style={{color:C.mutedHi,fontWeight:400,textTransform:"none"}}>(looks like https://xxxx.supabase.co)</span>
          </label>
          <input style={{...inp(),marginBottom:12}} placeholder="https://xxxx.supabase.co" value={url} onChange={e=>setUrl(e.target.value)}/>
          <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>
            Anon / Public Key <span style={{color:C.mutedHi,fontWeight:400,textTransform:"none"}}>(long string starting with eyJ…)</span>
          </label>
          <input style={{...inp(),marginBottom:14}} placeholder="eyJhbGci..." value={key} onChange={e=>setKey(e.target.value)}/>
          {err&&<div style={{fontSize:12,color:err.includes("Connected")?C.win:C.lose,marginBottom:10,padding:"8px 12px",background:err.includes("Connected")?"#0a1f0a":"#1f0a0a",borderRadius:8,border:"1px solid "+(err.includes("Connected")?"#1a3a1a":"#3a1a1a")}}>{err}</div>}
          <button
            style={{...Btn(url&&key?C.white:C.el,url&&key?C.bg:C.muted),width:"100%",padding:"12px",fontSize:14,borderRadius:10,opacity:testing?0.7:1}}
            disabled={!url||!key||testing}
            onClick={test}
          >
            {testing?"Connecting…":"Connect & Save →"}
          </button>
        </div>

        <div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:16,lineHeight:1.6}}>
          Your keys are saved locally on this device only. Supabase free tier includes 500MB storage and unlimited real-time connections.
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════ */
function App(){
  const[configured,setConfigured]=useState(()=>{const c=getConfig();return!!(c.url&&c.key)});
  const[tournaments,setTournaments]=useState([]); // loaded from DB
  const[activeTid,setActiveTid]=useState(null);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);
  const[online,setOnline]=useState(navigator.onLine);
  const[saved,setSaved]=useState(getSaved); // pinned tournament ids
  const[tab,setTab]=useState("play");
  const[tabKey,setTabKey]=useState(0);
  const[showTournaments,setShowTournaments]=useState(false);

  // Score counter
  const[p1,setP1]=useState("");
  const[p2,setP2]=useState("");
  const[score,setScore]=useState([0,0]);
  const[scoreStarted,setScoreStarted]=useState(false);
  const[flash,setFlash]=useState(null);
  const flashRef=useRef(null);

  // Game modal
  const[gameModal,setGameModal]=useState(null);
  const[lgWinner,setLgWinner]=useState("");
  const[lgLoser,setLgLoser]=useState("");
  const[lgWinScore,setLgWinScore]=useState("");
  const[lgLoseScore,setLgLoseScore]=useState("");
  const[lgBulk,setLgBulk]=useState(1);
  const[lgDate,setLgDate]=useState("");

  // Players modal
  const[showPlayers,setShowPlayers]=useState(false);
  const[newName,setNewName]=useState("");
  const[editIdx,setEditIdx]=useState(null);
  const[editName,setEditName]=useState("");

  // Position
  const[focusPlayer,setFocusPlayer]=useState(null);

  // History
  const[showAllHistory,setShowAllHistory]=useState(false);
  const[histFilter,setHistFilter]=useState("");

  // Tournament edit
  const[editTournIdx,setEditTournIdx]=useState(null);
  const[editTournName,setEditTournName]=useState("");

  // Share modal
  const[showShare,setShowShare]=useState(false);
  const[copied,setCopied]=useState(false);

  // New tournament modal
  const[showNewTourn,setShowNewTourn]=useState(false);
  const[newTournName,setNewTournName]=useState("");

  // Toast
  const[toast,setToast]=useState(null);
  const toastRef=useRef(null);

  const subRef=useRef(null);

  // Online/offline tracking
  useEffect(()=>{
    const on=()=>setOnline(true);
    const off=()=>setOnline(false);
    window.addEventListener("online",on);
    window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off)};
  },[]);

  function showToast(msg,dur=2800){
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToast(null),dur);
  }

  /* ── Load from DB or handle join link ── */
  useEffect(()=>{
    if(!configured)return;
    const params=new URLSearchParams(window.location.search);
    const joinId=params.get("join");
    if(joinId){
      // Someone followed a share link — load that tournament and make it active
      loadAndJoin(joinId);
    }else{
      loadTournaments();
    }
  },[configured]);

  async function loadAndJoin(tid){
    setLoading(true);
    const sb=getSB();
    if(!sb){setLoading(false);return}
    try{
      const{data,error}=await sb.from("tournaments").select("*").eq("id",tid).single();
      if(error||!data){showToast("Tournament not found.");setLoading(false);loadTournaments();return}
      const t=dbToLocal(data);
      // Also load all saved tournaments
      const savedList=getSaved();
      if(savedList.length>0){
        const{data:others}=await sb.from("tournaments").select("*").in("id",savedList.map(s=>s.id));
        const all=others?others.map(dbToLocal):[];
        // Merge — put joined one first if not already present
        const exists=all.find(x=>x.id===t.id);
        const final=exists?all:[t,...all];
        setTournaments(final);
      }else{
        setTournaments([t]);
      }
      setActiveTid(tid);
      // Pin it
      pinTournament(tid,t.name);
      // Clean URL
      window.history.replaceState({},"",window.location.pathname);
      showToast("Joined \""+t.name+"\" 🎉");
    }catch(e){console.error(e)}
    setLoading(false);
  }

  async function loadTournaments(){
    setLoading(true);
    const sb=getSB();
    if(!sb){setLoading(false);return}
    const savedList=getSaved();

    // Try to migrate local data first time
    const legacy=migrateLocal();

    let allTournaments=[];

    if(savedList.length>0){
      const ids=savedList.map(s=>s.id);
      const{data,error}=await sb.from("tournaments").select("*").in("id",ids);
      if(data)allTournaments=data.map(dbToLocal);
    }

    // If nothing loaded and we have legacy data, create a tournament
    if(allTournaments.length===0&&legacy){
      const t={id:uid(),name:"Tournament 1",playerOrder:legacy.playerOrder,history:legacy.history};
      const{error}=await sb.from("tournaments").upsert(localToDb(t));
      if(!error){
        allTournaments=[t];
        pinTournament(t.id,t.name);
        showToast("Migrated your existing data ✓");
      }
    }

    // If still nothing, create blank first tournament
    if(allTournaments.length===0){
      const t={id:uid(),name:"Tournament 1",playerOrder:[],history:[]};
      const{error}=await sb.from("tournaments").upsert(localToDb(t));
      if(!error){allTournaments=[t];pinTournament(t.id,t.name)}
    }

    setTournaments(allTournaments);
    // Restore last active or use first
    const lastActive=localStorage.getItem("elpong_active");
    const found=lastActive&&allTournaments.find(t=>t.id===lastActive);
    setActiveTid(found?lastActive:allTournaments[0]?.id);
    setLoading(false);
  }

  // Persist active tournament id
  useEffect(()=>{
    if(activeTid)localStorage.setItem("elpong_active",activeTid);
  },[activeTid]);

  /* ── Real-time subscription ── */
  useEffect(()=>{
    if(!configured||!activeTid)return;
    const sb=getSB();
    if(!sb)return;
    // Unsubscribe previous
    if(subRef.current){subRef.current.unsubscribe();subRef.current=null}

    const ch=sb.channel("tournament_"+activeTid)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"tournaments",filter:"id=eq."+activeTid},(payload)=>{
        const updated=dbToLocal(payload.new);
        setTournaments(prev=>prev.map(t=>t.id===activeTid?updated:t));
      })
      .subscribe();
    subRef.current=ch;
    return()=>{ch.unsubscribe();subRef.current=null};
  },[activeTid,configured]);

  /* ── DB helpers ── */
  function dbToLocal(row){
    return{
      id:row.id,
      name:row.name,
      playerOrder:Array.isArray(row.player_order)?row.player_order:[],
      history:Array.isArray(row.history)?row.history:[],
    };
  }
  function localToDb(t){
    return{id:t.id,name:t.name,player_order:t.playerOrder,history:t.history,updated_at:new Date().toISOString()};
  }

  /* ── Push update to DB ── */
  async function pushUpdate(t){
    setSyncing(true);
    const sb=getSB();
    if(!sb){setSyncing(false);return}
    try{
      await sb.from("tournaments").upsert(localToDb(t));
    }catch(e){console.error("sync error",e)}
    setSyncing(false);
  }

  /* ── Update active tournament ── */
  function updateSt(fn){
    setTournaments(prev=>{
      const next=prev.map(t=>t.id===activeTid?fn(t):t);
      const updated=next.find(t=>t.id===activeTid);
      if(updated)pushUpdate(updated);
      return next;
    });
  }

  /* ── Pin / unpin tournament ── */
  function pinTournament(id,name){
    const list=getSaved();
    if(list.find(s=>s.id===id))return;
    const next=[...list,{id,name,savedAt:Date.now()}];
    setSaved(next);
    setSaved(next); // state
    lsSet(LS_SAVED,next);
  }
  function unpinTournament(id){
    const next=getSaved().filter(s=>s.id!==id);
    lsSet(LS_SAVED,next);
    setSaved(next);
  }
  const isPinned=(id)=>getSaved().some(s=>s.id===id);

  /* ── Tournament management ── */
  async function createTournament(name){
    if(tournaments.length>=5){showToast("Max 5 tournaments");return}
    const sb=getSB();
    if(!sb)return;
    const t={id:uid(),name:name||"Tournament "+(tournaments.length+1),playerOrder:[],history:[]};
    const{error}=await sb.from("tournaments").insert(localToDb(t));
    if(error){showToast("Error creating tournament");return}
    setTournaments(prev=>[...prev,t]);
    setActiveTid(t.id);
    pinTournament(t.id,t.name);
    setShowNewTourn(false);
    setNewTournName("");
    switchTab("play");
    setShowTournaments(false);
    showToast("Created \""+t.name+"\" 🎉");
  }

  async function renameTournament(idx,name){
    const t=tournaments[idx];
    if(!name||name===t.name){setEditTournIdx(null);return}
    const updated={...t,name};
    setTournaments(prev=>prev.map((x,i)=>i===idx?updated:x));
    await pushUpdate(updated);
    // Update saved list name
    const list=getSaved().map(s=>s.id===t.id?{...s,name}:s);
    lsSet(LS_SAVED,list);
    setEditTournIdx(null);
    showToast("Renamed to \""+name+"\"");
  }

  async function deleteTournament(id){
    if(!window.confirm("Delete this tournament and all its data?"))return;
    const sb=getSB();
    if(sb)await sb.from("tournaments").delete().eq("id",id);
    unpinTournament(id);
    const next=tournaments.filter(t=>t.id!==id);
    setTournaments(next);
    if(activeTid===id)setActiveTid(next[0]?.id||null);
    setShowTournaments(false);
    showToast("Tournament deleted");
  }

  function switchToTournament(id){
    setActiveTid(id);
    setShowTournaments(false);
    switchTab("play");
    setP1("");setP2("");
    setScoreStarted(false);setScore([0,0]);
  }

  /* ── Share ── */
  function getShareLink(){
    const base=window.location.href.split("?")[0];
    return base+"?join="+activeTid;
  }
  function copyLink(){
    navigator.clipboard.writeText(getShareLink()).then(()=>{
      setCopied(true);setTimeout(()=>setCopied(false),2000);
    }).catch(()=>{
      // fallback: select text
      const el=document.getElementById("share-link-input");
      if(el){el.select();document.execCommand("copy");setCopied(true);setTimeout(()=>setCopied(false),2000)}
    });
  }
  function shareSMS(){
    const link=getShareLink();
    const msg="Join my EL PONG tournament \""+st.name+"\"! "+link;
    window.open("sms:?body="+encodeURIComponent(msg));
  }
  function shareNative(){
    if(navigator.share){
      navigator.share({title:"EL PONG — "+st.name,text:"Join my EL PONG tournament!",url:getShareLink()});
    }else{
      copyLink();showToast("Link copied!");
    }
  }

  /* ── Tab ── */
  function switchTab(t){
    if(t===tab)return;
    setTab(t);setTabKey(k=>k+1);
    setScoreStarted(false);setScore([0,0]);
    setFocusPlayer(null);setShowAllHistory(false);setHistFilter("");
  }

  /* ── Game modal ── */
  function openAdd(){setLgWinner("");setLgLoser("");setLgWinScore("");setLgLoseScore("");setLgBulk(1);setLgDate("");setGameModal({mode:"add"})}
  function openBulk(){setLgWinner("");setLgLoser("");setLgWinScore("");setLgLoseScore("");setLgBulk(1);setLgDate("");setGameModal({mode:"bulk"})}
  function openEdit(g){
    setLgWinner(g.winner);setLgLoser(g.loser);
    setLgWinScore(g.winScore!=null?String(g.winScore):"");
    setLgLoseScore(g.loseScore!=null?String(g.loseScore):"");
    setLgDate(new Date(g.ts).toISOString().slice(0,10));
    setGameModal({mode:"edit",game:g});
  }
  function submitGame(){
    if(!lgWinner||!lgLoser||lgWinner===lgLoser)return;
    const ws=lgWinScore!==""?parseInt(lgWinScore):null;
    const ls=lgLoseScore!==""?parseInt(lgLoseScore):null;
    const ts=lgDate?new Date(lgDate).getTime()+43200000:Date.now();
    if(gameModal.mode==="bulk"){
      const count=Math.max(1,parseInt(lgBulk)||1);
      const games=Array.from({length:count},(_,i)=>({id:uid(),winner:lgWinner,loser:lgLoser,winScore:ws,loseScore:ls,ts:ts-i*1000}));
      updateSt(t=>({...t,history:[...games,...t.history]}));
      showToast("Added "+count+" game"+(count>1?"s":"")+": "+lgWinner+" beat "+lgLoser);
    }else if(gameModal.mode==="add"){
      const game={id:uid(),winner:lgWinner,loser:lgLoser,winScore:ws,loseScore:ls,ts};
      updateSt(t=>({...t,history:[game,...t.history].sort((a,b)=>b.ts-a.ts)}));
      showToast(lgWinner+" beat "+lgLoser+(ws!=null?" ("+ws+"–"+ls+")":""));
    }else{
      updateSt(t=>({...t,history:t.history.map(h=>h.id===gameModal.game.id?{...h,winner:lgWinner,loser:lgLoser,winScore:ws,loseScore:ls,ts:lgDate?ts:h.ts}:h)}));
      showToast("Game updated.");
    }
    setGameModal(null);
  }
  function deleteGame(id){
    updateSt(t=>({...t,history:t.history.filter(h=>h.id!==id)}));
    showToast("Game removed.");setGameModal(null);
  }

  /* ── Score counter ── */
  function addPt(idx){
    setScore(prev=>{const n=[...prev];n[idx]++;return n});
    setFlash(idx);clearTimeout(flashRef.current);
    flashRef.current=setTimeout(()=>setFlash(null),280);
  }
  function subPt(idx){setScore(prev=>{const n=[...prev];n[idx]=Math.max(0,n[idx]-1);return n})}
  function finishGame(wi){
    const winner=wi===0?p1:p2,loser=wi===0?p2:p1;
    const ws=score[wi],ls=score[1-wi];
    updateSt(t=>({...t,history:[{id:uid(),winner,loser,winScore:ws,loseScore:ls,ts:Date.now()},...t.history]}));
    showToast(winner+" beat "+loser+" "+ws+"–"+ls);
    setScore([0,0]);setScoreStarted(false);
  }

  /* ── Players ── */
  function addPlayer(){
    const name=newName.trim();
    if(!name||st.playerOrder.includes(name))return;
    updateSt(t=>({...t,playerOrder:[...t.playerOrder,name]}));
    setNewName("");
  }
  function removePlayer(name){
    updateSt(t=>({...t,playerOrder:t.playerOrder.filter(n=>n!==name),history:t.history.filter(h=>h.winner!==name&&h.loser!==name)}));
    if(focusPlayer===name)setFocusPlayer(null);
  }
  function savePlayerEdit(idx){
    const old=st.playerOrder[idx],name=editName.trim();
    if(!name||name===old||st.playerOrder.includes(name)){setEditIdx(null);return}
    updateSt(t=>({...t,playerOrder:t.playerOrder.map(n=>n===old?name:n),history:t.history.map(h=>({...h,winner:h.winner===old?name:h.winner,loser:h.loser===old?name:h.loser}))}));
    if(focusPlayer===old)setFocusPlayer(name);
    setEditIdx(null);
  }
  function clearAll(){
    if(!window.confirm("Reset ALL games and stats for this tournament?"))return;
    updateSt(t=>({...t,history:[]}));showToast("All stats cleared.");
  }

  /* ── Active tournament data ── */
  const st=tournaments.find(t=>t.id===activeTid)||{name:"—",playerOrder:[],history:[]};
  const stats=computeStats(st.playerOrder,st.history);
  const sortedPlayers=rankP(st.playerOrder,stats);
  const displayHistory=histFilter?st.history.filter(h=>h.winner===histFilter||h.loser===histFilter):st.history;
  const canLog=lgWinner&&lgLoser&&lgWinner!==lgLoser;
  const canStart=p1&&p2&&p1!==p2;
  const pinned=isPinned(activeTid);

  /* ── Setup / loading screens ── */
  if(!configured)return<SetupScreen onDone={()=>{setConfigured(true)}}/>;

  if(loading)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:32}}>🏓</div>
      <div style={{fontSize:20,fontWeight:900,color:C.white,letterSpacing:"-0.5px"}}>EL PONG</div>
      <div className="pulse" style={{fontSize:12,color:C.muted}}>Loading…</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.white,fontFamily:"inherit",paddingBottom:72}}>

      {/* ══ HEADER ══ */}
      <div style={{background:C.surface,borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:60}}>
        <div style={{maxWidth:600,margin:"0 auto",padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{fontSize:18}}>🏓</div>
            <div>
              <div style={{fontSize:17,fontWeight:900,color:C.white,letterSpacing:"-0.5px",lineHeight:1}}>EL PONG</div>
              <div style={{fontSize:9,color:C.muted,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:1,display:"flex",alignItems:"center",gap:4}}>
                {st.name}
                {syncing&&<span className="pulse" style={{color:C.blue,fontSize:8}}>● syncing</span>}
                {!online&&<span style={{color:C.lose,fontSize:8}}>● offline</span>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={()=>setShowTournaments(v=>!v)} style={{...OBtn(C.border),padding:"5px 10px",fontSize:11,color:C.mutedHi,borderRadius:8,display:"flex",alignItems:"center",gap:4}}>
              <span>⚡</span><span>Tournaments</span>
            </button>
            <button onClick={()=>setShowShare(true)} style={{...OBtn(C.border),padding:"5px 10px",fontSize:11,color:C.mutedHi,borderRadius:8}}>🔗 Share</button>
            <button onClick={openAdd} style={{...Btn(C.white,C.bg),padding:"5px 11px",fontSize:11,borderRadius:8}}>+ Log</button>
          </div>
        </div>

        {/* Tournament drawer */}
        {showTournaments&&(
          <div className="slide-in" style={{borderTop:"1px solid "+C.border,background:C.surface,position:"absolute",left:0,right:0,top:"100%",zIndex:70,padding:"12px 14px 14px",boxShadow:"0 8px 24px rgba(0,0,0,0.6)"}}>
            <div style={{maxWidth:600,margin:"0 auto"}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Your Tournaments ({tournaments.length}/5)</div>
              {tournaments.map((t,i)=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                  {editTournIdx===i?(
                    <>
                      <input style={{...inp(),flex:1,padding:"7px 10px",fontSize:13}} value={editTournName} autoFocus
                        onChange={e=>setEditTournName(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter")renameTournament(i,editTournName);if(e.key==="Escape")setEditTournIdx(null)}}/>
                      <button style={{...Btn(C.win,"#000"),padding:"7px 11px",fontSize:11,borderRadius:7}} onClick={()=>renameTournament(i,editTournName)}>✓</button>
                      <button style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"6px 8px"}} onClick={()=>setEditTournIdx(null)}>✕</button>
                    </>
                  ):(
                    <>
                      <button onClick={()=>switchToTournament(t.id)} style={{flex:1,textAlign:"left",padding:"8px 11px",borderRadius:8,border:"1px solid "+(t.id===activeTid?C.white:C.border),background:t.id===activeTid?C.el:"transparent",color:t.id===activeTid?C.white:C.mutedHi,fontWeight:t.id===activeTid?700:400,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:7}}>
                        {t.id===activeTid&&<span style={{color:C.win,fontSize:9}}>●</span>}
                        <span style={{flex:1}}>{t.name}</span>
                        <span style={{fontSize:10,color:C.muted}}>{t.history.length}g</span>
                        {isPinned(t.id)&&<span style={{fontSize:9,color:C.gold}}>★</span>}
                      </button>
                      <button style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"6px"}} title="Rename" onClick={()=>{setEditTournIdx(i);setEditTournName(t.name)}}>✏️</button>
                      {tournaments.length>1&&<button style={{background:"none",border:"none",cursor:"pointer",color:C.lose,fontSize:13,padding:"6px"}} onClick={()=>deleteTournament(t.id)}>✕</button>}
                    </>
                  )}
                </div>
              ))}
              {tournaments.length<5&&(
                <button onClick={()=>{setShowNewTourn(true);setShowTournaments(false)}} style={{...OBtn(C.border),width:"100%",padding:"8px",fontSize:12,color:C.mutedHi,borderRadius:8,marginTop:2,borderStyle:"dashed"}}>+ New Tournament</button>
              )}
              <button onClick={()=>setShowTournaments(false)} style={{...Btn(C.el,C.muted),width:"100%",padding:"8px",fontSize:12,borderRadius:8,marginTop:8,border:"1px solid "+C.border}}>Close</button>
            </div>
          </div>
        )}
      </div>

      {/* Save / Pinned bar */}
      <div style={{background:C.hi,borderBottom:"1px solid "+C.border,padding:"6px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:600,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
        <div style={{fontSize:10,color:C.muted}}>
          {pinned?"★ Saved to this device":"Not saved to this device"}
        </div>
        {pinned?(
          <button onClick={()=>{unpinTournament(activeTid);showToast("Removed from saved")}} style={{...OBtn(C.border),padding:"3px 10px",fontSize:10,color:C.muted,borderRadius:6}}>Remove</button>
        ):(
          <button onClick={()=>{pinTournament(activeTid,st.name);showToast("★ Saved! Will appear when you reopen the app")}} style={{...Btn(C.gold,C.bg),padding:"3px 10px",fontSize:10,borderRadius:6}}>★ Save Tournament</button>
        )}
      </div>

      {/* ══ TAB BAR ══ */}
      <div style={{background:C.surface,borderBottom:"1px solid "+C.border,display:"flex",position:"sticky",top:52,zIndex:50}}>
        <div style={{maxWidth:600,margin:"0 auto",display:"flex",width:"100%"}}>
          {[["play","🏓 Score"],["standings","🏆 Rank"],["h2h","H2H"],["mypos","Position"],["history","History"]].map(([id,lbl])=>{
            const active=tab===id;
            return(
              <button key={id} onClick={()=>switchTab(id)} style={{flex:1,padding:"10px 2px",border:"none",background:"none",color:active?C.white:C.muted,borderBottom:"2px solid "+(active?C.white:"transparent"),fontWeight:active?700:400,fontSize:10.5,cursor:"pointer",transition:"color .15s,border-color .15s"}}>{lbl}</button>
            );
          })}
        </div>
      </div>

      {/* ══ BODY ══ */}
      <div key={tabKey} className="fade-in" style={{padding:"16px 14px 0",maxWidth:600,margin:"0 auto"}}>

        {/* SCORE */}
        {tab==="play"&&!scoreStarted&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Live Score Counter</div>
            <div style={{display:"flex",gap:10,marginBottom:12,alignItems:"flex-end"}}>
              <select style={{...inp(),flex:1,cursor:"pointer"}} value={p1} onChange={e=>setP1(e.target.value)}>
                <option value="">Player 1…</option>
                {st.playerOrder.map(n=><option key={n} value={n}>{n}</option>)}
              </select>
              <div style={{fontSize:12,color:C.muted,fontWeight:700,paddingBottom:12}}>vs</div>
              <select style={{...inp(),flex:1,cursor:"pointer"}} value={p2} onChange={e=>setP2(e.target.value)}>
                <option value="">Player 2…</option>
                {st.playerOrder.filter(n=>n!==p1).map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <button style={{...Btn(canStart?C.white:C.el,canStart?C.bg:C.muted),width:"100%",padding:"13px",fontSize:14,borderRadius:10,marginBottom:8}} disabled={!canStart} onClick={()=>{setScore([0,0]);setScoreStarted(true)}}>
              {canStart?"Start: "+p1+" vs "+p2:"Select two players"}
            </button>
            <div style={{paddingTop:14,borderTop:"1px solid "+C.border,marginTop:6}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Or just log a result</div>
              <div style={{display:"flex",gap:8}}>
                <button style={{...OBtn(C.border),flex:1,padding:"10px",fontSize:13,color:C.white,borderRadius:10}} onClick={openAdd}>+ Single game</button>
                <button style={{...OBtn(C.border),flex:1,padding:"10px",fontSize:13,color:C.mutedHi,borderRadius:10}} onClick={openBulk}>+ Bulk (past)</button>
              </div>
            </div>
            {/* Players shortcut */}
            <div style={{marginTop:12}}>
              <button style={{...OBtn(C.border),width:"100%",padding:"9px",fontSize:12,color:C.muted,borderRadius:10}} onClick={()=>setShowPlayers(true)}>✏️ Manage Players for {st.name}</button>
            </div>
          </>
        )}

        {tab==="play"&&scoreStarted&&(
          <>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              {[0,1].map(idx=>{
                const isF=flash===idx;
                return(
                  <div key={idx} style={{flex:1,background:C.surface,border:"2px solid "+(isF?C.white:C.border),borderRadius:16,padding:"14px 6px 16px",display:"flex",flexDirection:"column",alignItems:"center",gap:10,transition:"border-color .15s"}}>
                    <div style={{fontSize:13,fontWeight:800,color:C.white,textAlign:"center"}}>{idx===0?p1:p2}</div>
                    <div style={{fontSize:82,fontWeight:900,lineHeight:1,fontFamily:"monospace",color:isF?C.white:C.muted,transition:"color .15s"}}>{score[idx]}</div>
                    <div style={{display:"flex",gap:10}}>
                      <button style={{width:42,height:42,borderRadius:"50%",border:"1px solid "+C.border,background:"transparent",color:C.muted,fontSize:20,fontWeight:900,cursor:"pointer",userSelect:"none"}} onClick={()=>subPt(idx)}>−</button>
                      <button style={{width:54,height:54,borderRadius:"50%",border:"none",background:C.white,color:C.bg,fontSize:26,fontWeight:900,cursor:"pointer",userSelect:"none"}} onClick={()=>addPt(idx)}>+</button>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10,color:C.muted,textAlign:"center",marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Who won?</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button style={{...Btn(C.white,C.bg),flex:1,padding:"13px",fontSize:14,borderRadius:10}} onClick={()=>finishGame(0)}>{p1} won</button>
              <button style={{...Btn(C.el,C.white),border:"1px solid "+C.border,flex:1,padding:"13px",fontSize:14,borderRadius:10}} onClick={()=>finishGame(1)}>{p2} won</button>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{...OBtn(C.border),flex:1,padding:"9px",fontSize:12,color:C.muted,borderRadius:10}} onClick={()=>setScore([0,0])}>Reset</button>
              <button style={{...OBtn(C.border),flex:1,padding:"9px",fontSize:12,color:C.muted,borderRadius:10}} onClick={()=>{setScoreStarted(false);setScore([0,0])}}>← Back</button>
            </div>
          </>
        )}

        {/* STANDINGS */}
        {tab==="standings"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Ranked by overall win rate · all-time</div>
            {sortedPlayers.map((name,i)=>{
              const s=stats[name]||{};
              const wp=pct(s.wins||0,s.losses||0);
              const opps=st.playerOrder.filter(n=>n!==name);
              return(
                <div key={name} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"13px 14px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{fontSize:i<3?18:13,fontWeight:900,minWidth:28,textAlign:"center",color:i===0?C.gold:i===1?"#c0c0c0":i===2?"#cd7f32":C.muted}}>
                      {i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1)}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15}}>{name}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                        {s.wins||0}W–{s.losses||0}L · {(s.wins||0)+(s.losses||0)} games
                        {s.currentStreak>1?" · 🔥"+s.currentStreak+" streak":""}
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:900,fontSize:20,color:wp===null?C.even:wp>=50?C.win:C.lose}}>{wp!==null?wp+"%":"—"}</div>
                      <div style={{fontSize:10,color:C.muted}}>overall</div>
                    </div>
                  </div>
                  {opps.length>0&&(s.wins||0)+(s.losses||0)>0&&(
                    <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+C.border,display:"flex",gap:6,flexWrap:"wrap"}}>
                      {opps.map(opp=>{
                        const h=(s.h2h||{})[opp]||{w:0,l:0};
                        const op=pct(h.w,h.l);
                        return(
                          <div key={opp} style={{background:C.hi,borderRadius:7,padding:"4px 9px",fontSize:11,border:"1px solid "+C.border,display:"flex",gap:6,alignItems:"center"}}>
                            <span style={{color:C.muted}}>{opp}</span>
                            <span style={{fontWeight:800,color:op===null?C.even:op>=50?C.win:C.lose}}>{op!==null?op+"%":"—"}</span>
                            <span style={{color:C.muted,fontSize:10}}>({h.w}–{h.l})</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
            {st.playerOrder.length===0&&<div style={{color:C.muted,fontSize:13}}>Add players to get started.</div>}
          </>
        )}

        {/* H2H */}
        {tab==="h2h"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Games up/down — row vs column</div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"separate",borderSpacing:3,minWidth:240}}>
                <thead>
                  <tr>
                    <th style={{fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",padding:"4px 10px 4px 0",textAlign:"right"}}>↓ vs →</th>
                    {st.playerOrder.map(p=><th key={p} style={{fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",padding:"4px 7px",textAlign:"center"}}>{p}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {st.playerOrder.map(row=>(
                    <tr key={row}>
                      <td style={{fontSize:11,fontWeight:700,color:C.white,padding:"4px 10px 4px 0",textAlign:"right",whiteSpace:"nowrap"}}>{row}</td>
                      {st.playerOrder.map(col=>{
                        if(row===col)return<td key={col}><div style={{background:C.hi,borderRadius:6,minWidth:48,padding:"7px 5px"}}/></td>;
                        const net=netG(stats,row,col);
                        const h=(stats[row]?.h2h||{})[col]||{w:0,l:0};
                        return(
                          <td key={col}>
                            <div style={{background:net>0?"#0a1f0a":net<0?"#1f0a0a":C.hi,border:"1px solid "+(net>0?"#1a3a1a":net<0?"#3a1a1a":C.border),borderRadius:6,padding:"7px 5px",textAlign:"center",minWidth:48}}>
                              <div style={{fontSize:14,fontWeight:800,color:net>0?C.win:net<0?C.lose:C.even}}>{net>0?"+"+net:net===0?"—":net}</div>
                              {(h.w+h.l)>0&&<div style={{fontSize:9,color:C.muted,marginTop:1}}>{h.w}–{h.l}</div>}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:12}}>
              {[{col:C.win,lbl:"Ahead"},{col:C.lose,lbl:"Behind"},{col:C.even,lbl:"Even/none"}].map(({col,lbl})=>(
                <div key={lbl} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:C.muted}}>
                  <div style={{width:8,height:8,borderRadius:2,background:col}}/>{lbl}
                </div>
              ))}
            </div>
          </>
        )}

        {/* POSITION */}
        {tab==="mypos"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Select a player</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:16}}>
              {st.playerOrder.map(n=>(
                <button key={n} onClick={()=>setFocusPlayer(n)} style={{padding:"6px 13px",borderRadius:18,border:"1.5px solid "+(focusPlayer===n?C.white:C.border),background:focusPlayer===n?C.el:"transparent",color:focusPlayer===n?C.white:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>{n}</button>
              ))}
            </div>
            {focusPlayer&&stats[focusPlayer]&&(()=>{
              const s=stats[focusPlayer];
              const wp=pct(s.wins,s.losses);
              const myRank=sortedPlayers.indexOf(focusPlayer);
              const opps=st.playerOrder.filter(n=>n!==focusPlayer).sort((a,b)=>netG(stats,focusPlayer,b)-netG(stats,focusPlayer,a));
              const ptPct=s.pointsScored+s.pointsConceded>0?Math.round(s.pointsScored/(s.pointsScored+s.pointsConceded)*100):null;
              return(
                <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,overflow:"hidden",marginBottom:12}}>
                  <div style={{borderBottom:"1px solid "+C.border,padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <div>
                      <div style={{fontWeight:900,fontSize:20,color:C.white}}>{focusPlayer}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{wp!==null?wp+"% win rate · ":"No games · "}{s.wins}W–{s.losses}L</div>
                    </div>
                    <div style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:C.gold,background:C.el,borderRadius:6,padding:"3px 9px",border:"1px solid "+C.border}}>#{myRank+1} of {st.playerOrder.length}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",padding:"5px 14px",borderBottom:"1px solid "+C.border,background:C.hi}}>
                    <div style={{flex:1,fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>Opponent</div>
                    <div style={{minWidth:38,textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Net</div>
                    <div style={{minWidth:52,textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>W–L</div>
                    <div style={{minWidth:44,textAlign:"right",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Win%</div>
                  </div>
                  {opps.map(opp=>{
                    const net=netG(stats,focusPlayer,opp);
                    const h=(s.h2h||{})[opp]||{w:0,l:0};
                    const op=pct(h.w,h.l);
                    return(
                      <div key={opp} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid "+C.border}}>
                        <div style={{flex:1,fontWeight:600,fontSize:13}}>{opp}</div>
                        <div style={{fontWeight:800,fontSize:15,minWidth:38,textAlign:"center",color:net>0?C.win:net<0?C.lose:C.even}}>{net>0?"+"+net:net===0?"—":net}</div>
                        <div style={{fontSize:11,color:C.muted,minWidth:52,textAlign:"center"}}>{h.w}–{h.l}</div>
                        <div style={{fontWeight:800,fontSize:14,minWidth:44,textAlign:"right",color:op===null?C.even:op>=50?C.win:C.lose}}>{op!==null?op+"%":"—"}</div>
                      </div>
                    );
                  })}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderTop:"1px solid "+C.border}}>
                    {[{val:wp!==null?wp+"%":"—",lbl:"Win Rate"},{val:s.bestStreak||0,lbl:"Best Streak"},{val:ptPct!==null?ptPct+"%":"—",lbl:"Point %"}].map(({val,lbl},i)=>(
                      <div key={lbl} style={{padding:"10px 14px",borderRight:i===2?"none":"1px solid "+C.border}}>
                        <div style={{fontWeight:900,fontSize:18,color:C.white}}>{val}</div>
                        <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginTop:2}}>{lbl}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
            {!focusPlayer&&<div style={{color:C.muted,fontSize:13}}>Tap a player above to see their breakdown.</div>}
          </>
        )}

        {/* HISTORY */}
        {tab==="history"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>
              {displayHistory.length} game{displayHistory.length!==1?"s":""}{histFilter?" with "+histFilter:""} · tap to edit
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              <button style={{padding:"5px 11px",borderRadius:14,border:"1px solid "+(histFilter?"":C.white),background:histFilter?"transparent":C.el,color:histFilter?C.muted:C.white,fontWeight:600,fontSize:11,cursor:"pointer"}} onClick={()=>setHistFilter("")}>All</button>
              {st.playerOrder.map(n=>(
                <button key={n} style={{padding:"5px 11px",borderRadius:14,border:"1px solid "+(histFilter===n?C.white:C.border),background:histFilter===n?C.el:"transparent",color:histFilter===n?C.white:C.muted,fontWeight:600,fontSize:11,cursor:"pointer"}} onClick={()=>setHistFilter(histFilter===n?"":n)}>{n}</button>
              ))}
            </div>
            <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",textAlign:"center"}}>
                <button style={{background:"none",border:"1px dashed "+C.border,color:C.mutedHi,fontWeight:700,fontSize:12,cursor:"pointer",padding:"7px 18px",borderRadius:8,width:"100%"}} onClick={openAdd}>+ Add a game</button>
              </div>
              {displayHistory.length===0&&<div style={{padding:"20px 14px",color:C.muted,fontSize:13,textAlign:"center"}}>No games logged yet.</div>}
              {displayHistory.slice(0,showAllHistory?10000:50).map(h=>(
                <div key={h.id} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 12px",borderTop:"1px solid "+C.border,cursor:"pointer"}} onClick={()=>openEdit(h)}>
                  <div style={{fontWeight:700,fontSize:13,color:C.win,flex:1}}>{h.winner}</div>
                  <div style={{fontSize:11,color:C.muted,minWidth:32,textAlign:"center"}}>{h.winScore!=null?h.winScore+"–"+h.loseScore:"W"}</div>
                  <div style={{fontWeight:600,fontSize:13,color:C.lose,flex:1,textAlign:"right"}}>{h.loser}</div>
                  <div style={{fontSize:10,color:C.muted,marginLeft:4,whiteSpace:"nowrap"}}>{fmtTime(h.ts)}</div>
                  <div style={{fontSize:12,color:C.muted,marginLeft:2,opacity:0.5}}>✏️</div>
                </div>
              ))}
              {!showAllHistory&&displayHistory.length>50&&(
                <div style={{textAlign:"center",padding:"12px"}}>
                  <button style={{background:"none",border:"none",color:C.mutedHi,fontWeight:700,fontSize:13,cursor:"pointer"}} onClick={()=>setShowAllHistory(true)}>Show all {displayHistory.length} ↓</button>
                </div>
              )}
            </div>
            <div style={{marginTop:10}}>
              <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:12,color:C.muted,borderRadius:10}} onClick={openBulk}>+ Bulk add past games</button>
            </div>
          </>
        )}
      </div>

      {/* ══ SHARE MODAL ══ */}
      {showShare&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowShare(false)}>
          <div className="slide-in" style={{background:C.surface,border:"1px solid "+C.border,borderRadius:18,padding:"22px 18px 20px",width:"100%",maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:4}}>🔗 Share Tournament</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:18,lineHeight:1.6}}>
              Send this link to anyone — they open it in their browser and join instantly. Every change syncs live to all devices.
            </div>

            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:6}}>Tournament: {st.name}</div>

            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input
                id="share-link-input"
                readOnly
                value={getShareLink()}
                style={{...inp(),flex:1,fontSize:11,color:C.mutedHi,padding:"9px 10px"}}
                onFocus={e=>e.target.select()}
              />
              <button style={{...Btn(copied?C.win:C.white,copied?"#000":C.bg),padding:"9px 14px",fontSize:12,borderRadius:9,whiteSpace:"nowrap"}} onClick={copyLink}>
                {copied?"Copied!":"Copy"}
              </button>
            </div>

            {/* Share buttons */}
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button style={{...Btn("#1b8a4e",C.white),flex:1,padding:"11px",fontSize:13,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",gap:6}} onClick={shareSMS}>
                💬 Text Message
              </button>
              {navigator.share&&(
                <button style={{...Btn(C.el,C.white),border:"1px solid "+C.border,flex:1,padding:"11px",fontSize:13,borderRadius:10}} onClick={shareNative}>
                  Share…
                </button>
              )}
            </div>

            <div style={{background:C.hi,border:"1px solid "+C.border,borderRadius:10,padding:"11px 14px",marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:C.white,marginBottom:4}}>How it works</div>
              <div style={{fontSize:11,color:C.muted,lineHeight:1.7}}>
                • Anyone with the link can view and log games<br/>
                • Changes appear on all devices within seconds<br/>
                • Share the same link to as many people as you want<br/>
                • They tap "★ Save Tournament" to pin it on their device
              </div>
            </div>

            <button style={{...Btn(C.el,C.white),border:"1px solid "+C.border,width:"100%",padding:"10px",fontSize:13,borderRadius:10}} onClick={()=>setShowShare(false)}>Done</button>
          </div>
        </div>
      )}

      {/* ══ GAME MODAL ══ */}
      {gameModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setGameModal(null)}>
          <div className="slide-in" style={{background:C.surface,border:"1px solid "+C.border,borderRadius:18,padding:"22px 18px 18px",width:"100%",maxWidth:380,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:4}}>
              {gameModal.mode==="edit"?"Edit Game":gameModal.mode==="bulk"?"Bulk Add Past Games":"Log a Game"}
            </div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
              {gameModal.mode==="edit"&&"Change winner, loser, score, or date — or delete."}
              {gameModal.mode==="bulk"&&"Log multiple wins for the same person at once."}
              {gameModal.mode==="add"&&"Log a completed game. Score is optional."}
            </div>
            <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Winner</label>
            <select style={{...inp(),cursor:"pointer",marginBottom:12}} value={lgWinner} onChange={e=>{setLgWinner(e.target.value);if(e.target.value===lgLoser)setLgLoser("")}}>
              <option value="">Select winner…</option>
              {st.playerOrder.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
            <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Loser</label>
            <select style={{...inp(),cursor:"pointer",marginBottom:12}} value={lgLoser} onChange={e=>setLgLoser(e.target.value)}>
              <option value="">Select loser…</option>
              {st.playerOrder.filter(n=>n!==lgWinner).map(n=><option key={n} value={n}>{n}</option>)}
            </select>
            <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Score (optional)</label>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <input style={{...inp(),flex:1}} type="number" placeholder="Winner pts" value={lgWinScore} onChange={e=>setLgWinScore(e.target.value)}/>
              <input style={{...inp(),flex:1}} type="number" placeholder="Loser pts" value={lgLoseScore} onChange={e=>setLgLoseScore(e.target.value)}/>
            </div>
            {gameModal.mode==="bulk"&&(
              <>
                <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Number of wins for {lgWinner||"winner"}</label>
                <input style={{...inp(),marginBottom:12}} type="number" min={1} max={500} value={lgBulk} onChange={e=>setLgBulk(Math.max(1,parseInt(e.target.value)||1))}/>
              </>
            )}
            <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5,display:"block"}}>Date (optional)</label>
            <input style={{...inp()}} type="date" value={lgDate} onChange={e=>setLgDate(e.target.value)}/>
            <button style={{...Btn(canLog?C.white:C.el,canLog?C.bg:C.muted),width:"100%",padding:"12px",fontSize:15,borderRadius:10,marginTop:14}} disabled={!canLog} onClick={submitGame}>
              {gameModal.mode==="bulk"&&lgBulk>1?"Add "+lgBulk+" wins for "+(lgWinner||"winner"):gameModal.mode==="edit"?"Save Changes":"Save Game"}
            </button>
            <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:13,borderRadius:10,marginTop:8,color:C.muted}} onClick={()=>setGameModal(null)}>Cancel</button>
            {gameModal.mode==="edit"&&(
              <>
                <div style={{borderTop:"1px solid "+C.border,margin:"14px 0"}}/>
                <button style={{...OBtn(C.lose+"44"),width:"100%",padding:"10px",fontSize:13,borderRadius:10,color:C.lose}} onClick={()=>deleteGame(gameModal.game.id)}>🗑 Delete this game</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* ══ PLAYERS MODAL ══ */}
      {showPlayers&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowPlayers(false)}>
          <div className="slide-in" style={{background:C.surface,border:"1px solid "+C.border,borderRadius:18,padding:"22px 18px 18px",width:"100%",maxWidth:380,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:16}}>✏️ Players — {st.name}</div>
            {st.playerOrder.map((name,i)=>(
              <div key={name} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.border}}>
                {editIdx===i?(
                  <>
                    <input style={{...inp(),flex:1,padding:"7px 10px",fontSize:13}} value={editName} autoFocus onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&savePlayerEdit(i)}/>
                    <button style={{...Btn(C.win,"#000"),padding:"7px 11px",fontSize:11,borderRadius:7,marginLeft:6}} onClick={()=>savePlayerEdit(i)}>✓</button>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"6px 8px"}} onClick={()=>setEditIdx(null)}>✕</button>
                  </>
                ):(
                  <>
                    <div style={{flex:1,fontWeight:600,fontSize:14}}>{name}</div>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"2px 6px"}} onClick={()=>{setEditIdx(i);setEditName(name)}}>✏️</button>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:C.lose,fontSize:13,padding:"2px 6px"}} onClick={()=>removePlayer(name)}>✕</button>
                  </>
                )}
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <input style={{...inp(),flex:1,fontSize:13}} placeholder="New player name…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPlayer()}/>
              <button style={{...Btn(C.white,C.bg),padding:"9px 14px",fontSize:13,borderRadius:10}} onClick={addPlayer}>Add</button>
            </div>
            <button style={{...Btn(C.el,C.white),border:"1px solid "+C.border,width:"100%",marginTop:14,padding:"11px",fontSize:14,borderRadius:10}} onClick={()=>setShowPlayers(false)}>Done</button>
            <button style={{...OBtn(C.lose+"44"),width:"100%",marginTop:8,padding:"9px",fontSize:12,borderRadius:10,color:C.lose}} onClick={()=>{setShowPlayers(false);clearAll()}}>Reset all stats & history for {st.name}</button>
          </div>
        </div>
      )}

      {/* ══ NEW TOURNAMENT MODAL ══ */}
      {showNewTourn&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowNewTourn(false)}>
          <div className="slide-in" style={{background:C.surface,border:"1px solid "+C.border,borderRadius:18,padding:"22px 18px 18px",width:"100%",maxWidth:340}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:4}}>New Tournament</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Give it a name — you can change this later.</div>
            <input style={{...inp(),marginBottom:14}} placeholder="e.g. Summer League, Office Season 2…" value={newTournName} autoFocus onChange={e=>setNewTournName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createTournament(newTournName)}/>
            <button style={{...Btn(C.white,C.bg),width:"100%",padding:"12px",fontSize:14,borderRadius:10,marginBottom:8}} onClick={()=>createTournament(newTournName)}>Create Tournament</button>
            <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:13,borderRadius:10,color:C.muted}} onClick={()=>setShowNewTourn(false)}>Cancel</button>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast&&<div className="toast-pop" style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:C.el,border:"1px solid "+C.borderHi,color:C.white,fontWeight:700,fontSize:13,padding:"10px 20px",borderRadius:28,boxShadow:"0 4px 24px rgba(0,0,0,0.7)",zIndex:999,whiteSpace:"nowrap"}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
