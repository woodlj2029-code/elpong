function computeStats(playerOrder,history){
  const s={};
  playerOrder.forEach(n=>{
    s[n]={wins:0,losses:0,h2h:{},pointsScored:0,pointsConceded:0,currentStreak:0,bestStreak:0};
    playerOrder.forEach(m=>{if(m!==n)s[n].h2h[m]={w:0,l:0}});
  });
  const ord=[...history].sort((a,b)=>a.ts-b.ts);
  ord.forEach(g=>{
    const W=s[g.winner],L=s[g.loser];
    if(!W||!L)return;
    W.wins++;L.losses++;
    if(!W.h2h[g.loser])W.h2h[g.loser]={w:0,l:0};
    if(!L.h2h[g.winner])L.h2h[g.winner]={w:0,l:0};
    W.h2h[g.loser].w++;L.h2h[g.winner].l++;
    if(g.winScore!=null){W.pointsScored+=g.winScore;W.pointsConceded+=g.loseScore;L.pointsScored+=g.loseScore;L.pointsConceded+=g.winScore}
  });
  playerOrder.forEach(n=>{
    let cur=0,best=0;
    ord.forEach(g=>{if(g.winner===n){cur++;if(cur>best)best=cur}else if(g.loser===n)cur=0});
    s[n].currentStreak=cur;s[n].bestStreak=best;
  });
  return s;
}
function netG(stats,a,b){const h=stats[a]?.h2h?.[b]||{w:0,l:0};return h.w-h.l}
function rankP(playerOrder,stats){
  return[...playerOrder].sort((a,b)=>{
    const sa=stats[a]||{wins:0,losses:0},sb=stats[b]||{wins:0,losses:0};
    const ta=sa.wins+sa.losses,tb=sb.wins+sb.losses;
    const pa=ta>0?sa.wins/ta:-1,pb=tb>0?sb.wins/tb:-1;
    if(pb!==pa)return pb-pa;
    return(sb.wins-sb.losses)-(sa.wins-sa.losses);
  });
}
function pct(w,l){if(w+l===0)return null;return Math.round(w/(w+l)*100)}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function genCode(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code="";
  for(let i=0;i<6;i++)code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}
function fmtTime(ts){
  const d=new Date(ts),now=new Date(),diff=(now-d)/1000;
  if(diff<60)return"just now";
  if(diff<3600)return Math.floor(diff/60)+"m ago";
  if(diff<86400)return Math.floor(diff/3600)+"h ago";
  if(diff<604800)return Math.floor(diff/86400)+"d ago";
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:d.getFullYear()!==now.getFullYear()?"numeric":undefined});
}

function migrateLocal(){
  for(const key of[LS_LEGACY,LS_LEGACY2]){
    const d=lsGet(key);
    if(!d)continue;
    const po=d.playerOrder||(d.players?Object.keys(d.players):[]);
    const hist=(d.history||[]).map(h=>({...h,id:h.id||uid()}));
    if(po.length||hist.length)return{playerOrder:po,history:hist};
  }
  return null;
}

    img.onload=()=>{faceImgRef.current=img};
  },[]);

  function drawBird(ctx, x, y, dead){
    ctx.save();
    ctx.translate(x, y);
    if(dead){ ctx.rotate(0.45); }

    if(faceImgRef.current){
      // Sprite is 170x110 — draw centered, no circle clipping
      const sw=101, sh=90;
      ctx.globalAlpha = dead ? 0.75 : 1.0;
      ctx.drawImage(faceImgRef.current, -sw/2, -sh/2, sw, sh);
      ctx.globalAlpha = 1.0;
      // Red X overlay when dead
      if(dead){
        ctx.strokeStyle="rgba(239,68,68,0.9)";
        ctx.lineWidth=5;
        ctx.lineCap="round";
        [[-14,-14,14,14],[14,-14,-14,14]].forEach(([ax,ay,bx,by])=>{
          ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
        });
      }
    } else {
      ctx.beginPath();
      ctx.arc(0,0,BIRD_R,0,Math.PI*2);
      ctx.fillStyle="#f0e0c0";
      ctx.fill();
    }
    ctx.restore();
  }

  function spawnPipe(x){
    const topH = 80 + Math.random()*(H - GAP - 160);
    return {x, topH, passed:false};
  }

  function resetGame(){
    const g=gameRef.current;
    g.bird={y:H/2, vy:0};
    g.pipes=[spawnPipe(W+80), spawnPipe(W+80+280)];
    g.score=0;
    g.frame=0;
    g.state="playing";
  }

  function jump(){
    const g=gameRef.current;
    if(g.state==="idle"){ resetGame(); return; }
    if(g.state==="dead"){ resetGame(); return; }
    g.bird.vy=JUMP;
  }

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const g=gameRef.current;
    g.bird.y=H/2;

    function loop(){
      g.animId=requestAnimationFrame(loop);
      ctx.fillStyle="#000";
      ctx.fillRect(0,0,W,H);

      if(g.state==="playing"){
        // Physics
        g.bird.vy+=GRAVITY;
        g.bird.y+=g.bird.vy;
        g.frame++;

        // Move pipes
        g.pipes.forEach(p=>{ p.x-=PIPE_SPEED; });

        // Score
        g.pipes.forEach(p=>{
          if(!p.passed && p.x+PIPE_W < BIRD_X){
            p.passed=true; g.score++;
            if(g.score>bestRef.current){
              bestRef.current=g.score;
              lsSet("scratchy_best",g.score);
            }
          }
        });

        // Respawn pipes
        if(g.pipes[0].x < -PIPE_W-10) g.pipes.shift();
        if(g.pipes[g.pipes.length-1].x < W-260) g.pipes.push(spawnPipe(W+60));

        // Collision: floor/ceiling
        if(g.bird.y > H-BIRD_R || g.bird.y < BIRD_R){ g.state="dead"; }

        // Collision: pipes
        g.pipes.forEach(p=>{
          const bx=BIRD_X, by=g.bird.y, br=BIRD_R-4;
          const inX=bx+br>p.x && bx-br<p.x+PIPE_W;
          const inTop=by-br<p.topH;
          const inBot=by+br>p.topH+GAP;
          if(inX&&(inTop||inBot)) g.state="dead";
        });

        // Update display every 4 frames
        if(g.frame%4===0) setDisplay({state:g.state,score:g.score,best:bestRef.current});
      }

      // Draw pipes
      g.pipes.forEach(p=>{
        // Top pipe
        ctx.fillStyle="#fff";
        ctx.fillRect(p.x,0,PIPE_W,p.topH);
        ctx.fillStyle="#ccc";
        ctx.fillRect(p.x-4,p.topH-16,PIPE_W+8,16);
        // Bottom pipe
        const botY=p.topH+GAP;
        ctx.fillStyle="#fff";
        ctx.fillRect(p.x,botY,PIPE_W,H-botY);
        ctx.fillStyle="#ccc";
        ctx.fillRect(p.x-4,botY,PIPE_W+8,16);
        // Outlines
        ctx.strokeStyle="#555";
        ctx.lineWidth=1.5;
        ctx.strokeRect(p.x,0,PIPE_W,p.topH);
        ctx.strokeRect(p.x-4,p.topH-16,PIPE_W+8,16);
        ctx.strokeRect(p.x,botY,PIPE_W,H-botY);
        ctx.strokeRect(p.x-4,botY,PIPE_W+8,16);
      });

      // Draw floor line
      ctx.strokeStyle="#333";
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(0,H-2);
      ctx.lineTo(W,H-2);
      ctx.stroke();

      // Draw bird
      drawBird(ctx, BIRD_X, g.bird.y, g.state==="dead");

      // Score text
      ctx.fillStyle="#fff";
      ctx.font="bold 28px monospace";
      ctx.textAlign="center";
      ctx.fillText(g.score, W/2, 44);

      // Idle / Dead overlays
      if(g.state==="idle"){
        ctx.fillStyle="rgba(0,0,0,0.45)";
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle="#fff";
        ctx.font="bold 32px monospace";
        ctx.textAlign="center";
        ctx.fillText("SCRATCHY",W/2,H/2-40);
        ctx.font="16px monospace";
        ctx.fillStyle="#ccc";
        ctx.fillText("Tap or press Space to start",W/2,H/2+4);
        if(bestRef.current>0){
          ctx.fillStyle=C.gold;
          ctx.font="bold 16px monospace";
          ctx.fillText("Best: "+bestRef.current,W/2,H/2+34);
        }
      }
      if(g.state==="dead"){
        ctx.fillStyle="rgba(0,0,0,0.55)";
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle=C.lose;
        ctx.font="bold 34px monospace";
        ctx.textAlign="center";
        ctx.fillText("GAME OVER",W/2,H/2-50);
        ctx.fillStyle="#fff";
        ctx.font="bold 22px monospace";
        ctx.fillText("Score: "+g.score,W/2,H/2);
        ctx.fillStyle=C.gold;
        ctx.font="bold 18px monospace";
        ctx.fillText("Best: "+bestRef.current,W/2,H/2+34);
        ctx.fillStyle="#aaa";
        ctx.font="14px monospace";
        ctx.fillText("Tap to play again",W/2,H/2+68);
      }
    }
    loop();

    // Keyboard support
    function onKey(e){ if(e.code==="Space"||e.key===" "){ e.preventDefault(); jump(); } }
    window.addEventListener("keydown",onKey);
    return()=>{
      cancelAnimationFrame(g.animId);
      window.removeEventListener("keydown",onKey);
    };
  },[]);

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:24}}>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",padding:"12px 0 10px"}}>
        Scratchy {myName?"— "+myName:""}
      </div>
      <canvas
        ref={canvasRef}
        width={W}
        height={H}
        style={{display:"block",maxWidth:"100%",cursor:"pointer",borderRadius:12,border:"1px solid #222"}}
        onClick={jump}
        onTouchStart={e=>{e.preventDefault();jump()}}
      />
      <div style={{fontSize:11,color:C.muted,marginTop:10}}>Tap / click / Space to flap</div>
    </div>
  );
}

function App(){
  // Username & identity
  const[myName,setMyName]=useState(()=>lsGet("elpong_username")||"");
  const[showNameModal,setShowNameModal]=useState(()=>!lsGet("elpong_username"));
  const[nameInput,setNameInput]=useState("");
  const myId=lsGet("elpong_uid")||(()=>{const id=uid();lsSet("elpong_uid",id);return id})();

  // ── Bracket ──
  function shuffleArr(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
    return a;
  }

  function nextPowerOf2(n){let p=1;while(p<n)p*=2;return p}

  function buildBracket(seededPlayers){
    const size=nextPowerOf2(seededPlayers.length);
    // Pad with byes
    const padded=[...seededPlayers];
    while(padded.length<size)padded.push(null);
    // Build round 1 matchups
    const r1=[];
    for(let i=0;i<size;i+=2)r1.push({p1:padded[i],p2:padded[i+1],winner:padded[i+1]===null?padded[i]:null,isBye:padded[i+1]===null});
    const rounds=[r1];
    // Placeholder future rounds
    let prevSize=r1.length;
    while(prevSize>1){
      const round=[];
      for(let i=0;i<prevSize;i+=2)round.push({p1:null,p2:null,winner:null});
      rounds.push(round);
      prevSize=round.length;
    }
    setBracket({rounds,seededPlayers});
  }

  function randomBracket(){
    if(st.playerOrder.length<2){showToast("Need at least 2 players");return}
    buildBracket(shuffleArr(st.playerOrder));

  async function aiBracket(){
    if(st.playerOrder.length<2){showToast("Need at least 2 players");return}
    setBracketLoading(true);
    try{
      const ctx=buildStatsContext();
      const prompt="Based on this ping pong tournament data, return ONLY a JSON array of player names in seeding order from best to worst (most likely to win first). No explanation, just the JSON array.\n\n"+ctx;
      const body={model:"claude-sonnet-4-6",max_tokens:200,messages:[{role:"user",content:prompt}]};
      const res=await fetch(SB_URL+"/functions/v1/ai-proxy",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY},body:JSON.stringify(body)});
      const data=await res.json();
      const text=data.content&&data.content[0]?data.content[0].text:"[]";
      const cleaned=text.replace(/```json|```/g,"").trim();
      let seeded=JSON.parse(cleaned);
      // Filter to only valid players
      seeded=seeded.filter(n=>st.playerOrder.includes(n));
      // Add any missing players at end
      st.playerOrder.forEach(n=>{if(!seeded.includes(n))seeded.push(n)});
      buildBracket(seeded);
    }catch(e){
      showToast("AI seeding failed, using random");
      buildBracket(shuffleArr(st.playerOrder));
    }
    setBracketLoading(false);
  }

  function advanceWinner(roundIdx,matchIdx,winner){
    setBracket(prev=>{
      const rounds=prev.rounds.map(r=>r.map(m=>({...m})));
      rounds[roundIdx][matchIdx].winner=winner;
      // Place winner in next round
      if(roundIdx+1<rounds.length){
        const nextMatchIdx=Math.floor(matchIdx/2);
        const slot=matchIdx%2===0?"p1":"p2";
        rounds[roundIdx+1][nextMatchIdx][slot]=winner;
        rounds[roundIdx+1][nextMatchIdx].winner=null;
      }
      return{...prev,rounds};
    });
  }

      <div className="pulse" style={{fontSize:12,color:C.muted}}>Loading...</div>
    </div>
  );

  return(
    <div style={S.app}>

      {/* HEADER */}
      <div style={S.hdr}>
        <div style={S.hdrIn}>
          <div style={S.logo}>
            <div style={{fontSize:18}}>🏓</div>
            <div>
              <div style={S.appName}>EL PONG</div>
              <div style={S.appSub}>
                {st.name}
                {myName&&<span style={{color:C.mutedHi,fontSize:8}}>· {myName}</span>}
                {syncing&&<span className="pulse" style={{color:C.blue,fontSize:8}}>sync</span>}
                {!online&&<span style={{color:C.lose,fontSize:8}}>offline</span>}
              </div>
            </div>
          </div>
          <div style={S.hdrBtns}>
            <button style={S.hdrBtn} onClick={()=>setShowTournaments(v=>!v)}>Tournaments</button>
            <button style={S.hdrBtn} onClick={()=>setShowShare(true)}>
              {isHost()?"Share & Members":"Share"}
            </button>
            <button style={S.hdrBtnA} onClick={openAdd}>+ Log</button>
          </div>
        </div>

        {showTournaments&&(
          <div className="slide-in" style={S.drawer}>
            <div style={S.drawerIn}>
              <div style={S.secLbl}>Your Tournaments ({tournaments.length}/5)</div>
              {tournaments.map((t,i)=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                  {editTournIdx===i?(
                    <>
                      <input style={{...inp(),flex:1,padding:"7px 10px",fontSize:13}} value={editTournName} autoFocus
                        onChange={e=>setEditTournName(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter")renameTournament(i,editTournName);if(e.key==="Escape")setEditTournIdx(null)}}/>
                      <button style={{...Btn(C.win,"#000"),padding:"7px 11px",fontSize:11,borderRadius:7}} onClick={()=>renameTournament(i,editTournName)}>Save</button>
                      <button style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"6px 8px"}} onClick={()=>setEditTournIdx(null)}>x</button>
                    </>
                  ):(
                    <>
                      <button onClick={()=>switchToTournament(t.id)} style={{flex:1,textAlign:"left",padding:"8px 11px",borderRadius:8,border:"1px solid "+(t.id===activeTid?C.white:C.border),background:t.id===activeTid?C.hi:"transparent",color:t.id===activeTid?C.white:C.mutedHi,fontWeight:t.id===activeTid?700:400,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:7}}>
                        {t.id===activeTid&&<span style={{color:C.win,fontSize:9}}>*</span>}
                        <span style={{flex:1}}>{t.name}</span>
                        <span style={{fontSize:10,color:C.muted}}>{t.history.length} games</span>
                        {isPinned(t.id)&&<span style={{fontSize:9,color:C.gold}}>saved</span>}
                      </button>
                      <button style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"6px"}} onClick={()=>{setEditTournIdx(i);setEditTournName(t.name)}}>edit</button>
                      {tournaments.length>1&&<button style={{background:"none",border:"none",cursor:"pointer",color:C.lose,fontSize:13,padding:"6px"}} onClick={()=>deleteTournament(t.id)}>del</button>}
                    </>
                  )}
                </div>
              ))}
              {tournaments.length<5&&(
                <button onClick={()=>{setShowNewTourn(true);setShowTournaments(false)}} style={{...OBtn(C.border),width:"100%",padding:"8px",fontSize:12,color:C.mutedHi,borderRadius:8,marginTop:2}}>+ New Tournament</button>
              )}
              <button onClick={()=>{setShowJoinCode(true);setShowTournaments(false)}} style={{...OBtn(C.border),width:"100%",padding:"8px",fontSize:12,color:C.gold,borderRadius:8,marginTop:6,borderColor:C.gold+"44"}}>Enter Join Code</button>
              <button onClick={()=>setShowTournaments(false)} style={{...Btn(C.hi,C.muted),width:"100%",padding:"8px",fontSize:12,borderRadius:8,marginTop:8,border:"1px solid "+C.border}}>Close</button>
            </div>
          </div>
        )}
      </div>

      {/* SAVE BAR */}
      <div style={S.savebar}>
        <div style={{fontSize:10,color:C.muted}}>{pinned?"Saved to this device":"Not saved to this device"}</div>
        {pinned
          ?<button onClick={()=>{unpinTournament(activeTid);showToast("Removed from saved")}} style={{...OBtn(C.border),padding:"3px 10px",fontSize:10,color:C.muted,borderRadius:6}}>Remove</button>
          :<button onClick={()=>{pinTournament(activeTid,st.name);showToast("Saved!")}} style={{...Btn(C.gold,C.bg),padding:"3px 10px",fontSize:10,borderRadius:6}}>Save Tournament</button>
        }
      </div>

      {/* TABS */}
      <div style={S.tabBar}>
        <div style={S.tabIn}>
          {[["play","Score"],["standings","Standings"],["h2h","H2H"],["mypos","Position"],["bracket","Bracket"],["history","History"],["bird","🐦 Scratchy"],["profile","Profile"]].map(([id,lbl])=>{
            const active=tab===id;
            return(
              <button key={id} onClick={()=>switchTab(id)} style={{flex:1,padding:"11px 2px",border:"none",background:"none",color:active?C.white:C.muted,borderBottom:"2px solid "+(active?C.white:"transparent"),fontWeight:active?700:400,fontSize:11,cursor:"pointer",transition:"color .15s,border-color .15s"}}>
                {lbl}
              </button>
            );
          })}
        </div>
      </div>

      {/* BODY */}
      <div key={tab} className="fade-in" style={S.body}>

        {/* SCORE */}
        {tab==="play"&&!scoreStarted&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Live Score Counter</div>
            <div style={{display:"flex",gap:10,marginBottom:12,alignItems:"flex-end"}}>
              <select style={{...inp(),flex:1,cursor:"pointer"}} value={p1} onChange={e=>setP1(e.target.value)}>
                <option value="">Player 1...</option>
                {st.playerOrder.map(n=><option key={n} value={n}>{n}</option>)}
              </select>
              <div style={{fontSize:12,color:C.muted,fontWeight:700,paddingBottom:12}}>vs</div>
              <select style={{...inp(),flex:1,cursor:"pointer"}} value={p2} onChange={e=>setP2(e.target.value)}>
                <option value="">Player 2...</option>
                {st.playerOrder.filter(n=>n!==p1).map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <button style={{...Btn(canStart?C.white:C.hi,canStart?C.bg:C.muted),width:"100%",padding:"13px",fontSize:14,borderRadius:10,marginBottom:8}} disabled={!canStart} onClick={()=>{setScore([0,0]);setScoreStarted(true)}}>
              {canStart?"Start: "+p1+" vs "+p2:"Select two players"}
            </button>
            <div style={{paddingTop:14,borderTop:"1px solid "+C.border,marginTop:4}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Or just log a result</div>
              <div style={{display:"flex",gap:8}}>
                <button style={{...OBtn(C.border),flex:1,padding:"10px",fontSize:13,color:C.white,borderRadius:10}} onClick={openAdd}>+ Single game</button>
                <button style={{...OBtn(C.border),flex:1,padding:"10px",fontSize:13,color:C.mutedHi,borderRadius:10}} onClick={openBulk}>+ Bulk (past)</button>
              </div>
            </div>
            <div style={{marginTop:12}}>
              <button style={{...OBtn(C.border),width:"100%",padding:"9px",fontSize:12,color:C.muted,borderRadius:10}} onClick={()=>setShowPlayers(true)}>Edit Players for {st.name}</button>
            </div>
          </>
        )}

        {tab==="play"&&scoreStarted&&(
          <>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              {[0,1].map(idx=>{
                const isF=flash===idx;
                return(
                  <div key={idx} style={{flex:1,background:C.surface,border:"2px solid "+(isF?C.white:C.border),borderRadius:16,padding:"14px 6px 16px",display:"flex",flexDirection:"column",alignItems:"center",gap:10,transition:"border-color .15s"}}>
                    <div style={{fontSize:13,fontWeight:800,color:C.white,textAlign:"center"}}>{idx===0?p1:p2}</div>
                    <div style={{fontSize:82,fontWeight:900,lineHeight:1,fontFamily:"monospace",color:isF?C.white:C.muted,transition:"color .15s"}}>{score[idx]}</div>
                    <div style={{display:"flex",gap:10}}>
                      <button style={{width:42,height:42,borderRadius:"50%",border:"1px solid "+C.border,background:"transparent",color:C.muted,fontSize:20,fontWeight:900,cursor:"pointer",userSelect:"none"}} onClick={()=>subPt(idx)}>-</button>
                      <button style={{width:54,height:54,borderRadius:"50%",border:"none",background:C.white,color:C.bg,fontSize:26,fontWeight:900,cursor:"pointer",userSelect:"none"}} onClick={()=>addPt(idx)}>+</button>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10,color:C.muted,textAlign:"center",marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Who won?</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button style={{...Btn(C.white,C.bg),flex:1,padding:"13px",fontSize:14,borderRadius:10}} onClick={()=>finishGame(0)}>{p1} won</button>
              <button style={{...Btn(C.el,C.white),border:"1px solid "+C.border,flex:1,padding:"13px",fontSize:14,borderRadius:10}} onClick={()=>finishGame(1)}>{p2} won</button>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{...OBtn(C.border),flex:1,padding:"9px",fontSize:12,color:C.muted,borderRadius:10}} onClick={()=>setScore([0,0])}>Reset</button>
              <button style={{...OBtn(C.border),flex:1,padding:"9px",fontSize:12,color:C.muted,borderRadius:10}} onClick={()=>{setScoreStarted(false);setScore([0,0])}}>Back</button>
            </div>
          </>
        )}

        {/* STANDINGS */}
        {tab==="standings"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Ranked by overall win rate</div>
            {sortedPlayers.map((name,i)=>{
              const s=stats[name]||{};
              const wp=pct(s.wins||0,s.losses||0);
              const opps=st.playerOrder.filter(n=>n!==name);
              return(
                <div key={name} style={S.card}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{fontSize:i<3?18:13,fontWeight:900,minWidth:28,textAlign:"center",color:i===0?C.gold:i===1?"#c0c0c0":i===2?"#cd7f32":C.muted}}>
                      {i===0?"1st":i===1?"2nd":i===2?"3rd":"#"+(i+1)}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15}}>{name}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                        {s.wins||0}W - {s.losses||0}L - {(s.wins||0)+(s.losses||0)} games
                        {s.currentStreak>1?" - "+s.currentStreak+" streak":""}
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:900,fontSize:20,color:wp===null?C.even:wp>=50?C.win:C.lose}}>{wp!==null?wp+"%":"--"}</div>
                      <div style={{fontSize:10,color:C.muted}}>overall</div>
                    </div>
                  </div>
                  {opps.length>0&&(s.wins||0)+(s.losses||0)>0&&(
                    <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+C.border,display:"flex",gap:6,flexWrap:"wrap"}}>
                      {opps.map(opp=>{
                        const h=(s.h2h||{})[opp]||{w:0,l:0};
                        const op=pct(h.w,h.l);
                        return(
                          <div key={opp} style={{background:C.hi,borderRadius:7,padding:"4px 9px",fontSize:11,border:"1px solid "+C.border,display:"flex",gap:6,alignItems:"center"}}>
                            <span style={{color:C.muted}}>{opp}</span>
                            <span style={{fontWeight:800,color:op===null?C.even:op>=50?C.win:C.lose}}>{op!==null?op+"%":"--"}</span>
                            <span style={{color:C.muted,fontSize:10}}>({h.w}-{h.l})</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
            {st.playerOrder.length===0&&<div style={{color:C.muted,fontSize:13}}>Add players to get started.</div>}
          </>
        )}

        {/* H2H */}
        {tab==="h2h"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Games up/down - row vs column</div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"separate",borderSpacing:3,minWidth:240}}>
                <thead>
                  <tr>
                    <th style={{fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",padding:"4px 10px 4px 0",textAlign:"right"}}>vs</th>
                    {st.playerOrder.map(p=><th key={p} style={{fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",padding:"4px 7px",textAlign:"center"}}>{p}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {st.playerOrder.map(row=>(
                    <tr key={row}>
                      <td style={{fontSize:11,fontWeight:700,color:C.white,padding:"4px 10px 4px 0",textAlign:"right",whiteSpace:"nowrap"}}>{row}</td>
                      {st.playerOrder.map(col=>{
                        if(row===col)return<td key={col}><div style={{background:C.hi,borderRadius:6,minWidth:48,padding:"7px 5px"}}/></td>;
                        const net=netG(stats,row,col);
                        const h=(stats[row]?.h2h||{})[col]||{w:0,l:0};
                        return(
                          <td key={col}>
                            <div style={{background:net>0?"#0a1f0a":net<0?"#1f0a0a":C.hi,border:"1px solid "+(net>0?"#1a3a1a":net<0?"#3a1a1a":C.border),borderRadius:6,padding:"7px 5px",textAlign:"center",minWidth:48}}>
                              <div style={{fontSize:14,fontWeight:800,color:net>0?C.win:net<0?C.lose:C.even}}>{net>0?"+"+net:net===0?"--":net}</div>
                              {(h.w+h.l)>0&&<div style={{fontSize:9,color:C.muted,marginTop:1}}>{h.w}-{h.l}</div>}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:12}}>
              {[{col:C.win,lbl:"Ahead"},{col:C.lose,lbl:"Behind"},{col:C.even,lbl:"Even/none"}].map(({col,lbl})=>(
                <div key={lbl} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:C.muted}}>
                  <div style={{width:8,height:8,borderRadius:2,background:col}}/>{lbl}
                </div>
              ))}
            </div>
          </>
        )}

        {/* POSITION */}
        {tab==="mypos"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Select a player</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:16}}>
              {st.playerOrder.map(n=>(
                <button key={n} onClick={()=>setFocusPlayer(n)} style={{padding:"6px 13px",borderRadius:18,border:"1.5px solid "+(focusPlayer===n?C.white:C.border),background:focusPlayer===n?C.hi:"transparent",color:focusPlayer===n?C.white:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>{n}</button>
              ))}
            </div>
            {focusPlayer&&stats[focusPlayer]&&(()=>{
              const s=stats[focusPlayer];
              const wp=pct(s.wins,s.losses);
              const myRank=sortedPlayers.indexOf(focusPlayer);
              const opps=st.playerOrder.filter(n=>n!==focusPlayer).sort((a,b)=>netG(stats,focusPlayer,b)-netG(stats,focusPlayer,a));
              const ptPct=s.pointsScored+s.pointsConceded>0?Math.round(s.pointsScored/(s.pointsScored+s.pointsConceded)*100):null;
              return(
                <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,overflow:"hidden",marginBottom:12}}>
                  <div style={{borderBottom:"1px solid "+C.border,padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <div>
                      <div style={{fontWeight:900,fontSize:20,color:C.white}}>{focusPlayer}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{wp!==null?wp+"% win rate - ":"No games - "}{s.wins}W - {s.losses}L</div>
                    </div>
                    <div style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:C.gold,background:C.hi,borderRadius:6,padding:"3px 9px",border:"1px solid "+C.border}}>#{myRank+1} of {st.playerOrder.length}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",padding:"5px 14px",borderBottom:"1px solid "+C.border,background:C.hi}}>
                    <div style={{flex:1,fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Opponent</div>
                    <div style={{minWidth:38,textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Net</div>
                    <div style={{minWidth:52,textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>W-L</div>
                    <div style={{minWidth:44,textAlign:"right",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Win%</div>
                  </div>
                  {opps.map(opp=>{
                    const net=netG(stats,focusPlayer,opp);
                    const h=(s.h2h||{})[opp]||{w:0,l:0};
                    const op=pct(h.w,h.l);
                    return(
                      <div key={opp} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid "+C.border}}>
                        <div style={{flex:1,fontWeight:600,fontSize:13}}>{opp}</div>
                        <div style={{fontWeight:800,fontSize:15,minWidth:38,textAlign:"center",color:net>0?C.win:net<0?C.lose:C.even}}>{net>0?"+"+net:net===0?"--":net}</div>
                        <div style={{fontSize:11,color:C.muted,minWidth:52,textAlign:"center"}}>{h.w}-{h.l}</div>
                        <div style={{fontWeight:800,fontSize:14,minWidth:44,textAlign:"right",color:op===null?C.even:op>=50?C.win:C.lose}}>{op!==null?op+"%":"--"}</div>
                      </div>
                    );
                  })}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderTop:"1px solid "+C.border}}>
                    {[{val:wp!==null?wp+"%":"--",lbl:"Win Rate"},{val:s.bestStreak||0,lbl:"Best Streak"},{val:ptPct!==null?ptPct+"%":"--",lbl:"Point %"}].map(({val,lbl},i)=>(
                      <div key={lbl} style={{padding:"10px 14px",borderRight:i===2?"none":"1px solid "+C.border}}>
                        <div style={{fontWeight:900,fontSize:18,color:C.white}}>{val}</div>
                        <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginTop:2}}>{lbl}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
            {!focusPlayer&&<div style={{color:C.muted,fontSize:13}}>Tap a player above to see their breakdown.</div>}
          </>
        )}

        {/* HISTORY */}
        {tab==="history"&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>
              {displayHistory.length} game{displayHistory.length!==1?"s":""}{histFilter?" with "+histFilter:""} - tap to edit
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              <button style={{padding:"5px 11px",borderRadius:14,border:"1px solid "+(histFilter?"":C.white),background:histFilter?"transparent":C.hi,color:histFilter?C.muted:C.white,fontWeight:600,fontSize:11,cursor:"pointer"}} onClick={()=>setHistFilter("")}>All</button>
              {st.playerOrder.map(n=>(
                <button key={n} style={{padding:"5px 11px",borderRadius:14,border:"1px solid "+(histFilter===n?C.white:C.border),background:histFilter===n?C.hi:"transparent",color:histFilter===n?C.white:C.muted,fontWeight:600,fontSize:11,cursor:"pointer"}} onClick={()=>setHistFilter(histFilter===n?"":n)}>{n}</button>
              ))}
            </div>
            <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",textAlign:"center"}}>
                <button style={{background:"none",border:"1px dashed "+C.border,color:C.mutedHi,fontWeight:700,fontSize:12,cursor:"pointer",padding:"7px 18px",borderRadius:8,width:"100%"}} onClick={openAdd}>+ Add a game</button>
              </div>
              {displayHistory.length===0&&<div style={{padding:"20px 14px",color:C.muted,fontSize:13,textAlign:"center"}}>No games logged yet.</div>}
              {displayHistory.slice(0,showAllHistory?10000:50).map(h=>(
                <div key={h.id} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 12px",borderTop:"1px solid "+C.border,cursor:"pointer"}} onClick={()=>openEdit(h)}>
                  <div style={{fontWeight:700,fontSize:13,color:C.win,flex:1}}>{h.winner}</div>
                  <div style={{fontSize:11,color:C.muted,minWidth:32,textAlign:"center"}}>{h.winScore!=null?h.winScore+"-"+h.loseScore:"W"}</div>
                  <div style={{fontWeight:600,fontSize:13,color:C.lose,flex:1,textAlign:"right"}}>{h.loser}</div>
                  <div style={{fontSize:10,color:C.muted,marginLeft:4,whiteSpace:"nowrap"}}>{fmtTime(h.ts)}</div>
                  <div style={{fontSize:12,color:C.muted,marginLeft:2,opacity:0.5}}>edit</div>
                </div>
              ))}
              {!showAllHistory&&displayHistory.length>50&&(
                <div style={{textAlign:"center",padding:"12px"}}>
                  <button style={{background:"none",border:"none",color:C.mutedHi,fontWeight:700,fontSize:13,cursor:"pointer"}} onClick={()=>setShowAllHistory(true)}>Show all {displayHistory.length}</button>
                </div>
              )}
            </div>
            <div style={{marginTop:10}}>
              <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:12,color:C.muted,borderRadius:10}} onClick={openBulk}>+ Bulk add past games</button>
            </div>
          </>
        )}
      </div>

      {/* GAME MODAL */}
      {gameModal&&(
        <div style={S.overlay} onClick={()=>setGameModal(null)}>
          <div className="slide-in" style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:C.white,marginBottom:4}}>
              {gameModal.mode==="edit"?"Edit Game":gameModal.mode==="bulk"?"Bulk Add Past Games":"Log a Game"}
            </div>

                              <div style={{position:"absolute",right:-8,top:"50%",width:8,height:1,background:C.border}}/>
                            )}
                            <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:8,overflow:"hidden"}}>
                              {[match.p1,match.p2].map((player,pi)=>(
                                <div key={pi}
                                  onClick={()=>player&&!match.isBye&&advanceWinner(ri,mi,player)}
                                  style={{
                                    padding:"8px 10px",
                                    background:match.winner===player&&player?C.win+"22":pi===0?"transparent":C.hi,
                                    borderTop:pi===1?"1px solid "+C.border:"none",
                                    cursor:player&&!match.isBye?"pointer":"default",
                                    display:"flex",alignItems:"center",gap:6,
                                    transition:"background .15s",
                                  }}>
                                  {match.winner===player&&player&&<span style={{fontSize:9,color:C.win}}>*</span>}
                                  <span style={{fontSize:12,fontWeight:match.winner===player?800:500,color:player?C.white:C.muted,flex:1}}>
                                    {player||"BYE"}
                                  </span>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>
              {/* Champion */}
              {(()=>{
                const finalRound=bracket.rounds[bracket.rounds.length-1];
                const champ=finalRound&&finalRound[0]&&finalRound[0].winner;
                if(!champ)return null;
                return(
                  <div style={{background:"#1a1500",border:"2px solid "+C.gold,borderRadius:14,padding:"16px",textAlign:"center",marginTop:8}}>
                    <div style={{fontSize:11,color:C.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Champion</div>
                    <div style={{fontSize:26,fontWeight:900,color:C.gold}}>{champ}</div>
                  </div>
                );
              })()}
              <button style={{...OBtn(C.border),width:"100%",padding:"10px",fontSize:12,color:C.muted,borderRadius:10,marginTop:12}} onClick={()=>setBracket(null)}>Clear Bracket</button>
              <div style={{fontSize:10,color:C.muted,textAlign:"center",marginTop:8}}>Tap a player name to advance them as the winner</div>
            </>
          )}
        </div>
      )}

      
      {toast&&<div className="toast-pop" style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:C.el,border:"1px solid "+C.border,color:C.white,fontWeight:700,fontSize:13,padding:"10px 20px",borderRadius:28,boxShadow:"0 4px 24px rgba(0,0,0,0.5)",zIndex:999,whiteSpace:"nowrap"}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
